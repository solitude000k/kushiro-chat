<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者セットアップ ～ 釧チャ</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .setup-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .setup-card {
      background: var(--bg-surface);
      border: 1px solid rgba(239,83,80,0.35);
      border-radius: 20px;
      padding: 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }
    .setup-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .setup-icon {
      width: 44px; height: 44px;
      background: rgba(239,83,80,0.12);
      border: 1px solid rgba(239,83,80,0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .setup-title { font-size: 1.1rem; font-weight: 700; color: #ef5350; }
    .setup-subtitle { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 24px; line-height: 1.7; }
    .warning-box {
      background: rgba(239,83,80,0.08);
      border: 1px solid rgba(239,83,80,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }
    .warning-box strong { color: #ef5350; }
  </style>
</head>
<body>
<div class="night-bg"></div>
<div class="setup-page">
  <div class="setup-card fade-in">
    <div class="setup-header">
      <div class="setup-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#ef5350" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <div>
        <div class="setup-title">管理者セットアップ</div>
        <div style="font-size:0.7rem;color:var(--text-muted);">Administrator Account Setup</div>
      </div>
    </div>

    <p class="setup-subtitle">
      このページは管理者アカウントを作成するための専用ページです。<br>
      管理者アカウントが既に存在する場合、このページは使用できません。
    </p>

    <div class="warning-box">
      ⚠️ <strong>注意：</strong> このページのURLを他人に教えないでください。<br>
      管理者アカウントは一度のみ作成可能です。<br>
      作成後は強力なパスワードを設定し、厳重に管理してください。
    </div>

    <!-- 既存管理者存在チェック -->
    <div id="state-exists" class="hidden">
      <div style="text-align:center;padding:20px 0;">
        <div style="font-size:2.5rem;margin-bottom:12px;">🔒</div>
        <div style="font-size:0.9rem;color:var(--text-secondary);font-weight:600;margin-bottom:6px;">管理者アカウントは既に存在します</div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:20px;line-height:1.6;">このページは再利用できません。</div>
        <a href="index.html" class="btn btn-secondary btn-sm" style="text-decoration:none;">ログインページへ</a>
      </div>
    </div>

    <!-- セットアップフォーム -->
    <div id="state-form">
      <div class="form-group">
        <label class="form-label">ニックネーム <span style="color:#ef5350">*</span></label>
        <input type="text" id="admin-nickname" class="form-input" placeholder="管理者の表示名" maxlength="20" value="管理者">
      </div>
      <div class="form-group">
        <label class="form-label">管理者パスワード <span style="color:#ef5350">*</span></label>
        <div class="input-wrap-rel">
          <input type="password" id="admin-pw" class="form-input" placeholder="12文字以上を推奨" autocomplete="new-password">
          <button type="button" class="pw-toggle-btn" onclick="togglePw()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;">
          <div id="pw-strength-bar" style="height:100%;border-radius:2px;width:0;transition:all .3s;"></div>
        </div>
        <div id="pw-strength-label" style="font-size:.7rem;color:var(--text-muted);margin-top:3px;"></div>
      </div>
      <div class="form-group">
        <label class="form-label">パスワード確認 <span style="color:#ef5350">*</span></label>
        <div class="input-wrap-rel">
          <input type="password" id="admin-pw2" class="form-input" placeholder="同じパスワードをもう一度" autocomplete="new-password">
          <button type="button" class="pw-toggle-btn" onclick="togglePw2()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div id="setup-err" style="font-size:.78rem;color:#ef5350;min-height:20px;margin-bottom:8px;text-align:center;"></div>
      <button id="setup-btn" class="btn btn-sm w-full" onclick="doSetup()"
        style="background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.4);justify-content:center;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        管理者アカウントを作成
      </button>
    </div>

    <!-- 完了 -->
    <div id="state-done" class="hidden" style="text-align:center;padding:20px 0;">
      <div style="font-size:2.5rem;margin-bottom:12px;">✅</div>
      <div style="font-size:0.95rem;color:var(--text-primary);font-weight:600;margin-bottom:6px;">管理者アカウントを作成しました</div>
      <div style="font-size:0.78rem;color:var(--text-muted);margin-bottom:20px;line-height:1.6;">
        ユーザーID：<strong style="color:var(--amber);font-family:monospace;">Administrator</strong><br>
        設定したパスワードでログインしてください。
      </div>
      <a href="index.html" class="btn btn-primary btn-sm" style="text-decoration:none;">ログインページへ</a>
    </div>

  </div>
</div>

<script src="js/storage.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // 管理者アカウントが既に存在するかチェック
  const existing = Storage.Accounts.getAll().find(a => a.userId === 'Administrator');
  if (existing) {
    document.getElementById('state-form').classList.add('hidden');
    document.getElementById('state-exists').classList.remove('hidden');
  }

  document.getElementById('admin-pw').addEventListener('input', function() {
    checkStrength(this.value);
  });
});

function checkStrength(pw) {
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const colors = ['#ef5350','#ef5350','#fb8c00','#66bb6a','#43a047'];
  const labels = ['非常に弱い','弱い','普通','強い','非常に強い'];
  const bar = document.getElementById('pw-strength-bar');
  bar.style.width = ((score / 5) * 100) + '%';
  bar.style.background = colors[score - 1] || '#ef5350';
  document.getElementById('pw-strength-label').textContent = labels[score - 1] || '';
}

function togglePw() {
  const el = document.getElementById('admin-pw');
  el.type = el.type === 'password' ? 'text' : 'password';
}
function togglePw2() {
  const el = document.getElementById('admin-pw2');
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function doSetup() {
  const nickname = document.getElementById('admin-nickname').value.trim();
  const pw  = document.getElementById('admin-pw').value;
  const pw2 = document.getElementById('admin-pw2').value;
  const err = document.getElementById('setup-err');
  err.textContent = '';

  if (!nickname) { err.textContent = 'ニックネームを入力してください'; return; }
  if (pw.length < 8) { err.textContent = 'パスワードは8文字以上にしてください'; return; }
  if (pw !== pw2)    { err.textContent = 'パスワードが一致しません'; return; }

  // 再度チェック（多重送信防止）
  if (Storage.Accounts.getAll().find(a => a.userId === 'Administrator')) {
    err.textContent = '管理者アカウントは既に存在します';
    return;
  }

  document.getElementById('setup-btn').disabled = true;

  const passwordHash = await Storage.sha256(pw);
  const account = {
    id:           'a_admin_' + Date.now(),
    userId:       'Administrator',
    email:        'admin@local',
    passwordHash,
    nickname,
    color:        '#ef5350',
    avatarDataUrl:'',
    verified:     true,
    createdAt:    new Date().toISOString(),
    updatedAt:    new Date().toISOString(),
  };
  const accounts = Storage.Accounts.getAll();
  accounts.push(account);
  Storage.Accounts.save(accounts);

  document.getElementById('state-form').classList.add('hidden');
  document.getElementById('state-done').classList.remove('hidden');
}
</script>
</body>
</html>
