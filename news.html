<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>釧路ニュース ─ 釧チャ</title>
  <link rel="icon" href="favicon.ico">
  <link rel="stylesheet" href="css/style.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    /* ===== ヘッダー ===== */
    .top-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; height: 60px;
      background: rgba(10,14,26,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
    }
    .header-brand { display:flex;align-items:center;gap:10px;text-decoration:none; }
    .header-brand img { width:36px;height:36px; }
    .header-brand-text { font-family:var(--font-serif);font-size:1.1rem;font-weight:700;color:var(--amber);letter-spacing:.02em;line-height:1.2; }
    .header-brand-sub { font-size:.62rem;color:var(--text-muted);letter-spacing:.08em;text-transform:uppercase; }
    .header-nav { display:flex;align-items:center;gap:4px; }
    .nav-link {
      display:flex;align-items:center;gap:5px;
      padding:6px 14px;border-radius:8px;
      font-size:.82rem;font-weight:500;
      color:var(--text-secondary);text-decoration:none;
      transition:all .18s ease;
    }
    .nav-link:hover { background:var(--bg-hover);color:var(--text-primary); }
    .nav-link.active { color:var(--amber);background:var(--amber-subtle); }
    .header-auth { display:flex;align-items:center;gap:8px; }

    /* ===== ページヘッダー ===== */
    .page-hero {
      background: linear-gradient(to bottom, var(--bg-surface), var(--bg-deep));
      border-bottom: 1px solid var(--border);
      padding: 40px 24px 36px;
      text-align: center;
      position: relative; overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 100% at 50% 0%, rgba(244,166,32,0.05) 0%, transparent 70%);
    }
    .page-hero-inner { position: relative; z-index: 1; max-width: 600px; margin: 0 auto; }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px; margin-bottom: 14px;
      background: rgba(244,166,32,0.1); color: var(--amber);
      border: 1px solid rgba(244,166,32,0.2); border-radius: 999px;
      font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
    }
    .page-title {
      font-family: var(--font-serif);
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 700; color: var(--text-primary); margin-bottom: 10px;
    }
    .page-title span { color: var(--amber); }
    .page-desc { font-size: .85rem; color: var(--text-secondary); line-height: 1.8; }

    /* ===== メインコンテンツ ===== */
    .news-layout {
      max-width: 980px; margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* ===== ステータスバー ===== */
    /* 管理者更新ボタン */
    .admin-refresh-btn {
      display: none; /* JS で admin のみ表示 */
      align-items: center; gap: 6px;
      padding: 5px 14px; border-radius: 8px;
      background: rgba(244,166,32,0.1);
      border: 1px solid rgba(244,166,32,0.3);
      color: var(--amber); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .18s;
    }
    .admin-refresh-btn:hover { background: rgba(244,166,32,0.2); }
    .admin-refresh-btn.spinning svg { animation: spin .8s linear infinite; }
    .status-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; margin-bottom: 24px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; flex-wrap: wrap; gap: 8px;
    }
    .status-left { display: flex; align-items: center; gap: 10px; font-size: .78rem; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%; background: #66bb6a;
      box-shadow: 0 0 8px rgba(102,187,106,0.6);
      animation: pulse 2s ease-in-out infinite;
    }
    .status-dot.loading { background: var(--amber); box-shadow: 0 0 8px rgba(244,166,32,0.5); }
    .status-dot.error { background: #ef5350; box-shadow: 0 0 8px rgba(239,83,80,0.5); animation: none; }
    @keyframes pulse { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.3); opacity:.7; } }
    .status-time { color: var(--text-muted); }
    .refresh-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px; background: var(--bg-elevated);
      border: 1px solid var(--border); border-radius: 8px;
      font-size: .75rem; color: var(--text-secondary); cursor: pointer;
      transition: all .18s;
    }
    .refresh-btn:hover { border-color: var(--border-amber); color: var(--amber); }
    .refresh-btn:disabled { opacity: .5; cursor: not-allowed; }
    .refresh-btn svg { transition: transform .4s; }
    .refresh-btn.spinning svg { animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== サマリーカード ===== */
    .summary-card {
      background: var(--bg-card);
      border: 1px solid rgba(244,166,32,0.2);
      border-radius: 14px; padding: 20px 22px;
      margin-bottom: 28px;
      position: relative; overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(to right, var(--amber), var(--cyan));
    }
    .summary-label {
      font-size: .68rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--amber); margin-bottom: 8px;
    }
    .summary-text {
      font-size: .92rem; color: var(--text-secondary); line-height: 1.9;
    }

    /* ===== カテゴリ セクション ===== */
    .news-section { margin-bottom: 32px; }
    .section-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px; padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .section-icon { font-size: 1.3rem; }
    .section-name {
      font-family: var(--font-serif); font-size: 1.05rem;
      font-weight: 700; color: var(--text-primary);
    }
    .section-count {
      margin-left: auto; font-size: .7rem;
      background: var(--bg-elevated); color: var(--text-muted);
      padding: 2px 8px; border-radius: 999px;
    }
    .news-items { display: flex; flex-direction: column; gap: 10px; }
    .news-item {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
      transition: all .2s ease; position: relative;
      overflow: hidden;
    }
    .news-item::before {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .news-item.urgency-high::before { background: #ef5350; }
    .news-item.urgency-normal::before { background: var(--amber); }
    .news-item.urgency-low::before { background: var(--cyan); opacity: .5; }
    .news-item:hover { border-color: rgba(244,166,32,0.2); transform: translateX(2px); }
    .news-item-title {
      font-size: .9rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: 6px; line-height: 1.5;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .urgency-badge {
      flex-shrink: 0; margin-top: 1px;
      font-size: .6rem; padding: 1px 7px; border-radius: 999px;
      font-weight: 700; letter-spacing: .06em;
    }
    .urgency-badge.high   { background: rgba(239,83,80,0.15);  color: #ef5350;  border: 1px solid rgba(239,83,80,0.3); }
    .urgency-badge.normal { background: rgba(244,166,32,0.12); color: var(--amber); border: 1px solid rgba(244,166,32,0.25); }
    .urgency-badge.low    { background: rgba(77,208,225,0.1);  color: var(--cyan);  border: 1px solid rgba(77,208,225,0.2); }
    .news-item-detail {
      font-size: .82rem; color: var(--text-secondary); line-height: 1.8;
    }

    /* ===== スケルトン ===== */
    .skeleton {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px; margin-bottom: 10px;
    }
    .skeleton-line {
      height: 12px; border-radius: 6px;
      background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.6s infinite;
      margin-bottom: 8px;
    }
    .skeleton-line.short { width: 60%; }
    .skeleton-line.long  { width: 90%; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ===== エラー ===== */
    .error-card {
      text-align: center; padding: 48px 24px;
      background: var(--bg-card); border: 1px solid rgba(239,83,80,0.2);
      border-radius: 16px; color: var(--text-secondary);
    }
    .error-card .error-icon { font-size: 2.5rem; margin-bottom: 16px; display: block; }
    .error-card h3 { color: #ef5350; font-family: var(--font-serif); margin-bottom: 10px; }

    /* ===== 天気ウィジェット ===== */
    .weather-widget {
      display: flex; align-items: stretch; justify-content: center;
      gap: 0; margin-top: 20px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px; overflow: hidden;
      max-width: 480px; margin-left: auto; margin-right: auto;
      backdrop-filter: blur(8px);
    }
    .weather-left {
      flex: 1; padding: 14px 18px;
      display: flex; flex-direction: column; gap: 8px;
      border-right: 1px solid rgba(255,255,255,0.07);
    }
    .weather-right {
      padding: 14px 20px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      min-width: 100px;
    }
    .weather-stat {
      display: flex; align-items: center; gap: 8px;
      font-size: .78rem;
    }
    .weather-stat-label {
      color: var(--text-muted); font-size: .68rem; letter-spacing: .04em;
      min-width: 56px;
    }
    .weather-stat-value {
      color: var(--text-primary); font-weight: 600; font-size: .82rem;
    }
    .weather-stat-value.rain  { color: #64b5f6; }
    .weather-stat-value.humid { color: var(--cyan); }
    .weather-stat-value.wind  { color: #a5d6a7; }
    .weather-icon-large { font-size: 2.4rem; line-height: 1; }
    .weather-cond-text { font-size: .72rem; color: var(--text-muted); text-align: center; }
    .weather-temp { font-size: 1.1rem; font-weight: 700; color: var(--amber); }
    .weather-loading { opacity: .4; font-size: .75rem; color: var(--text-muted); text-align:center; padding: 16px; }
    /* 説明文の追加行 */
    .page-desc-sub {
      margin-top: 8px; font-size: .8rem;
      color: var(--cyan); opacity: .85; letter-spacing: .02em;
    }

    /* ===== キャッシュ注記 ===== */
    .cache-note {
      text-align: center; font-size: .72rem; color: var(--text-muted);
      padding: 16px; border-top: 1px solid var(--border); margin-top: 24px;
    }

    /* ===== リッチ表示 ===== */
    /* 時刻バッジ */
    .time-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: .68rem; font-weight: 600; letter-spacing: .04em;
      color: var(--cyan); background: rgba(77,208,225,0.1);
      border: 1px solid rgba(77,208,225,0.2);
      padding: 1px 7px; border-radius: 999px; flex-shrink: 0;
    }
    /* キーワードハイライト */
    .kw-high   { color: #ef5350; font-weight: 700; }
    .kw-warn   { color: var(--amber); font-weight: 600; }
    .kw-info   { color: var(--cyan); }
    /* アイテムヘッダー行 */
    .news-item-header {
      display: flex; align-items: flex-start;
      gap: 7px; flex-wrap: wrap; margin-bottom: 7px;
    }
    .news-item-title-text { flex: 1; min-width: 0; font-size: .9rem; font-weight: 600; color: var(--text-primary); line-height: 1.5; }
    /* 空アイテム */
    .news-item.empty-item { opacity: .45; background: transparent; border-style: dashed; }
    .news-item.empty-item::before { display: none; }
    /* アイテムカウント（件数） */
    .section-count { margin-left: auto; font-size: .7rem; background: var(--bg-elevated); color: var(--text-muted); padding: 2px 8px; border-radius: 999px; flex-shrink: 0; }
    /* 高urgencyアイテム：左ボーダー脈動 */
    .news-item.urgency-high { animation: borderPulse 3s ease-in-out infinite; }
    @keyframes borderPulse {
      0%,100% { border-color: rgba(239,83,80,.25); }
      50%      { border-color: rgba(239,83,80,.55); }
    }
    /* rawTextトグル */
    .raw-toggle {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 24px; padding: 7px 14px;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 8px; font-size: .75rem; color: var(--text-muted);
      cursor: pointer; transition: all .18s;
    }
    .raw-toggle:hover { color: var(--amber); border-color: rgba(244,166,32,.3); }
    .raw-box {
      display: none; margin-top: 10px; padding: 14px 16px;
      background: var(--bg-surface); border: 1px solid var(--border);
      border-radius: 10px; font-size: .75rem; color: var(--text-muted);
      line-height: 1.8; white-space: pre-wrap; word-break: break-all;
      max-height: 320px; overflow-y: auto;
    }

    /* レスポンシブ */
    /* レスポンシブ */
    @media (max-width: 640px) {
      .top-header { padding: 0 14px; }
      .header-nav .nav-link span { display: none; }
      .news-layout { padding: 20px 14px 48px; }
    }
  </style>
</head>
<body>

<!-- ===== ヘッダー ===== -->
<header class="top-header">
  <a href="top.html" class="header-brand">

<!-- ===== ページヘッダー ===== -->
<div class="page-hero">
  <div class="page-hero-inner">
    <div class="page-eyebrow">📡latest news</div>
    <h1 class="page-title">釧路 <span>最新情報</span></h1>
    <p class="page-desc">
      釧路市・釧路町の最新情報をリアルタイムで収集。<br>

</div>

<!-- ===== メイン ===== -->
<div class="news-layout">

  <!-- ステータスバー -->
  <div class="status-bar">
    <div class="status-left">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text" style="color:var(--text-secondary);">情報を取得中...</span>
    </div>
    <button class="admin-refresh-btn" id="admin-refresh-btn" onclick="adminRefresh(this)">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      強制更新
    </button>
  </div>

  <!-- コンテンツエリア -->
  <div id="news-content">
    <!-- スケルトン -->
    <div id="skeleton-sections">
      <div class="news-section">
        <div class="section-header">
          <div class="skeleton-line" style="width:140px;height:16px;margin:0;"></div>
        </div>
        <div class="skeleton"><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
        <div class="skeleton"><div class="skeleton-line short"></div><div class="skeleton-line" style="width:80%;"></div></div>
      </div>
      <div class="news-section">
        <div class="section-header">
          <div class="skeleton-line" style="width:120px;height:16px;margin:0;"></div>
        </div>
        <div class="skeleton"><div class="skeleton-line short"></div><div class="skeleton-line long"></div></div>
      </div>
    </div>
  </div>

  <div class="cache-note" id="cache-note" style="display:none;"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script>
// ヘッダー: ログイン済み
(function() {
  const sess = Storage.Session.get();
  if (sess) {
    document.getElementById('header-auth').innerHTML = `
      <a href="account.html" class="btn btn-ghost" style="font-size:.82rem;padding:6px 14px;">${escHtml(sess.nickname || sess.name || 'アカウント')}</a>
      <a href="chat.html" class="btn btn-primary" style="font-size:.82rem;padding:6px 14px;">掲示板へ</a>`;
  }
})();

function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}

async function loadNews(forceRefresh = false) {
  const dot   = document.getElementById('status-dot');
  const txt   = document.getElementById('status-text');
  const note  = document.getElementById('cache-note');
  const area  = document.getElementById('news-content');

  dot.className = 'status-dot loading';
  txt.textContent = '情報を取得中...';
  txt.style.color = 'var(--text-secondary)';

  try {
    const url = window.KUSHIRO_API_BASE + '/api/news' + (forceRefresh ? '?refresh=1' : '');
    const res = await fetch(url, {
      headers: { 'X-API-Secret': window.KUSHIRO_API_SECRET }
    });
    const data = await res.json();

    if (!data.ok) throw new Error(data.error || 'APIエラー');

    renderNews(data);

    dot.className = 'status-dot';
    const cached = data.cached;
    const stale  = data.stale;
    const fetchTime = data.fetchedAt ? new Date(data.fetchedAt) : new Date();
    const timeStr = fetchTime.toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
    txt.textContent = stale ? `⚠ 古いキャッシュ: ${timeStr}` : cached ? `キャッシュ: ${timeStr}` : `最終更新: ${timeStr}`;
    txt.style.color = stale ? '#ef5350' : 'var(--text-muted)';

    if (stale) {
      const age = Math.floor((Date.now() - (data.fetchedAt||0)) / 60000);
      note.textContent = `⚠ API制限中のため、約${age}分前の情報を表示しています。しばらくしてから「更新」ボタンをお試しください。`;
      note.style.display = '';
      note.style.color = '#ef5350';
    } else if (cached) {
      const age = Math.floor((Date.now() - (data.fetchedAt||0)) / 60000);
      note.textContent = `⏱ このデータは約${age}分前に取得されたものです。30分ごとに自動更新されます。`;
      note.style.display = '';
      note.style.color = 'var(--text-muted)';
    } else {
      note.style.display = 'none';
    }
  } catch(e) {
    dot.className = 'status-dot error';
    txt.textContent = '取得エラー';
    txt.style.color = '#ef5350';
    area.innerHTML = `
      <div class="error-card">
        <span class="error-icon">📡</span>
        <h3>情報の取得に失敗しました</h3>
        <p style="font-size:.83rem;margin-top:8px;">${escHtml(e.message)}</p>
        <button onclick="loadNews()" class="btn btn-ghost" style="margin-top:20px;font-size:.82rem;">再試行</button>
      </div>`;
  } finally {
  }
}

// ---- キーワードハイライト定義 ----
const HIGHLIGHT = [
  { words: ['通行止め','事故','火災','警報','逮捕','緊急','危険','地震','津波','重体','死亡','爆発','強盗','不審'], cls: 'kw-high' },
  { words: ['渋滞','工事','規制','遅延','遅れ','注意','運休','徐行','禁止','閉鎖'], cls: 'kw-warn' },
  { words: ['開催','募集','お知らせ','案内','イベント','予定','無料'], cls: 'kw-info' },
];

// フロント側でもMarkdown残渣を除去（Workerパース漏れの保険）
function stripMd(s) {
  return (s || '')
    .replace(/\*{1,3}([^*]+)\*{1,3}/g, '$1')
    .replace(/_{1,2}([^_]+)_{1,2}/g, '$1')
    .replace(/`([^`]+)`/g, '$1')
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
    .replace(/^#{1,6}\s*/gm, '')
    .replace(/^[=\-]{3,}$/gm, '')
    .replace(/^[・\-\*\+]\s*/gm, '')
    .replace(/^\d+\.\s*/gm, '')
    .replace(/^【(.+?)】/gm, '$1')
    .replace(/^「(.+?)」/gm, '$1')
    .replace(/\s+/g, ' ')
    .trim();
}

function highlightText(text) {
  if (!text) return '';
  let t = escHtml(text);
  for (const { words, cls } of HIGHLIGHT) {
    for (const w of words) {
      const re = new RegExp(escHtml(w), 'g');
      t = t.replace(re, `<span class="${cls}">${escHtml(w)}</span>`);
    }
  }
  return t;
}

// 固定4カテゴリ定義
const FIXED_CATS = [
  { key: '交通・インフラ情報',    icon: '🚗', label: '交通・インフラ情報', sub: '(1時間以内の更新を含む)' },
  { key: '事件・事故・社会',       icon: '🚨', label: '事件・事故・社会',   sub: '' },
  { key: '地域イベント・行政情報', icon: '📅', label: '地域イベント・行政情報', sub: '' },
  { key: '補足',                   icon: '📌', label: '補足',              sub: '' },
];

function renderNews(data) {
  const area = document.getElementById('news-content');
  const rawSections = data.sections || [];

  function findSection(catKey) {
    const exact   = rawSections.find(s => s.category === catKey);
    if (exact) return exact;
    const partial = rawSections.find(s =>
      s.category && (s.category.includes(catKey.split('・')[0]) || catKey.includes(s.category.split('・')[0]))
    );
    return partial || null;
  }

  if (!rawSections.length) {
    area.innerHTML = `<div class="error-card"><span class="error-icon">📭</span><h3>ニュースが見つかりませんでした</h3></div>`;
    return;
  }

  const urgLabels = { high: '速報', normal: '情報', low: '参考' };

  let html = '';
  FIXED_CATS.forEach(cat => {
    const sec   = findSection(cat.key);
    const items = sec ? (sec.items || []) : [];
    const realItems  = items.filter(i => !i.empty);
    const emptyItems = items.filter(i => i.empty);

    html += `
      <div class="news-section">
        <div class="section-header">
          <span class="section-icon">${cat.icon}</span>
          <span class="section-name">${cat.label}</span>
          ${cat.sub ? `<span style="font-size:.68rem;color:var(--text-muted);margin-left:2px;">${cat.sub}</span>` : ''}
          <span class="section-count">${realItems.length}件</span>
        </div>
        <div class="news-items">`;

    if (realItems.length === 0) {
      html += `
          <div class="news-item urgency-low empty-item">
            <div class="news-item-header">
              <span class="urgency-badge low">参考</span>
              <span class="news-item-title-text" style="color:var(--text-muted);">現在確認できる情報はありません</span>
            </div>
          </div>`;
    } else {
      realItems.forEach(item => {
        const urg = item.urgency || 'normal';
        html += `
          <div class="news-item urgency-${escHtml(urg)}">
            <div class="news-item-header">
              <span class="urgency-badge ${escHtml(urg)}">${urgLabels[urg] || '情報'}</span>
              ${item.time ? `<span class="time-badge">🕐 ${escHtml(item.time)}</span>` : ''}
              <span class="news-item-title-text">${highlightText(stripMd(item.title))}</span>
            </div>
            ${item.detail ? `<p class="news-item-detail">${highlightText(stripMd(item.detail))}</p>` : ''}
          </div>`;
      });
    }

    html += `
        </div>
      </div>`;
  });

  // rawText デバッグ表示トグル
  if (data.rawText) {
    html += `
      <div style="text-align:center;">
        <button class="raw-toggle" onclick="toggleRaw(this)">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
          Gemini 生テキストを表示
        </button>
        <div class="raw-box" id="raw-box">${escHtml(data.rawText)}</div>
      </div>`;
  }

  area.innerHTML = html;
}

function toggleRaw(btn) {
  const box = document.getElementById('raw-box');
  const open = box.style.display === 'block';
  box.style.display = open ? 'none' : 'block';
  btn.textContent = open ? '📄 Gemini 生テキストを表示' : '📄 Gemini 生テキストを閉じる';
}
// ---- 管理者チェックと更新ボタン制御 ----
async function checkAdminAndShowRefresh() {
  try {
    const session = Storage.Session.get();
    if (!session) return;
    const res = await API.get('/api/accounts/me');
    if (res && res.ok && res.account && res.account.userId === 'Administrator') {
      const btn = document.getElementById('admin-refresh-btn');
      if (btn) btn.style.display = 'flex';
    }
  } catch(e) { /* 管理者でなければ何もしない */ }
}

async function adminRefresh(btn) {
  btn.classList.add('spinning');
  btn.disabled = true;
  try {
    await loadNews(true);
  } finally {
    btn.classList.remove('spinning');
    btn.disabled = false;
  }
}

// ---- 天気取得 (Open-Meteo, APIキー不要) ----
async function loadWeather() {
  const WW = {
    0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️',
    45:'🌫', 48:'🌫',
    51:'🌦', 53:'🌦', 55:'🌧',
    61:'🌧', 63:'🌧', 65:'🌧',
    71:'🌨', 73:'🌨', 75:'❄️',
    80:'🌦', 81:'🌧', 82:'⛈',
    95:'⛈', 96:'⛈', 99:'⛈',
  };
  const WD = {
    0:'快晴', 1:'ほぼ晴れ', 2:'一部曇り', 3:'曇り',
    45:'霧', 48:'霧氷',
    51:'霧雨（弱）', 53:'霧雨', 55:'霧雨（強）',
    61:'小雨', 63:'雨', 65:'大雨',
    71:'小雪', 73:'雪', 75:'大雪',
    80:'にわか雨（弱）', 81:'にわか雨', 82:'激しいにわか雨',
    95:'雷雨', 96:'雷雨（雹）', 99:'激しい雷雨',
  };
  try {
    const res = await fetch(
      'https://api.open-meteo.com/v1/forecast' +
      '?latitude=43.0&longitude=144.4' +
      '&current=temperature_2m,relative_humidity_2m,precipitation_probability,wind_speed_10m,weather_code' +
      '&wind_speed_unit=ms&timezone=Asia%2FTokyo'
    );
    if (!res.ok) throw new Error('weather fetch failed');
    const d = await res.json();
    const cur = d.current;
    const code  = cur.weather_code ?? 0;
    const icon  = WW[code] ?? '🌡';
    const cond  = WD[code] ?? '不明';
    const temp  = cur.temperature_2m != null ? `${cur.temperature_2m.toFixed(1)}℃` : '--';
    const rain  = cur.precipitation_probability != null ? `${cur.precipitation_probability}%` : '--';
    const humid = cur.relative_humidity_2m != null ? `${cur.relative_humidity_2m}%` : '--';
    const wind  = cur.wind_speed_10m != null ? `${cur.wind_speed_10m.toFixed(1)} m/s` : '--';

    document.getElementById('weather-widget').innerHTML = `
      <div class="weather-left">
        <div class="weather-stat">
          <span class="weather-stat-label">☔ 降水確率</span>
          <span class="weather-stat-value rain">${rain}</span>
        </div>
        <div class="weather-stat">
          <span class="weather-stat-label">💧 湿度</span>
          <span class="weather-stat-value humid">${humid}</span>
        </div>
        <div class="weather-stat">
          <span class="weather-stat-label">💨 風速</span>
          <span class="weather-stat-value wind">${wind}</span>
        </div>
      </div>
      <div class="weather-right">
        <span class="weather-icon-large">${icon}</span>
        <span class="weather-temp">${temp}</span>
        <span class="weather-cond-text">${cond}</span>
      </div>`;
  } catch(e) {
    document.getElementById('weather-widget').innerHTML =
      '<div class="weather-loading" style="width:100%;">天気情報を取得できませんでした</div>';
  }
}

// 初回読み込み
loadWeather();
loadNews();
checkAdminAndShowRefresh();
</script>
