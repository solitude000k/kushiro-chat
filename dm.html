<!DOCTYPE html>
<html lang="ja">
<head>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダイレクトメッセージ ～ 釧チャ</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/dm.css">

<style>
.nav-item{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:.8rem;font-weight:500;color:var(--text-secondary);text-decoration:none;transition:all .18s;}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary);}
.nav-item.active{color:var(--amber);background:rgba(244,166,32,0.08);}
</style>
</head>
<body>
<div class="night-bg"></div>
<div class="dm-layout">
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <a href="chat.html" class="btn-icon" title="チャットに戻る" style="color:var(--text-secondary);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </a>
      <a href="chat.html" class="header-brand">
        <img src="images/logo.svg" alt="ロゴ">
        <div>
          <div class="header-brand-text">釧チャ</div>
          <div class="header-brand-sub">ダイレクトメッセージ</div>
        </div>
      </a>
    </div>
    <div class="header-actions">
      <div class="header-user" id="user-menu-trigger">
        <div class="avatar avatar-sm" id="header-avatar"></div>
        <span class="header-user-name" id="header-username"></span>
      </div>
    </div>

      <nav style="display:flex;align-items:center;gap:4px;">
        <a href="top.html" class="nav-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>トップ</a>
        <a href="news.html" class="nav-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>ニュース</a>
        <a href="chat.html" class="nav-item active"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>掲示板</a>
      </nav>
  </header>

  <div class="dm-body">
    <aside class="dm-sidebar" id="dm-sidebar">
      <div class="dm-sidebar-header"><span>メッセージ</span></div>
      <div class="dm-conv-list" id="dm-conv-list">
        <div class="dm-empty-conv"><span>📭</span><p>まだメッセージはありません</p></div>
      </div>
    </aside>

    <main class="dm-main">
      <div class="dm-no-conv" id="dm-no-conv">
        <div class="big-icon">💬</div>
        <h2>ダイレクトメッセージ</h2>
        <p>左のリストから会話を選ぶか、<br>チャットから相手のアイコンをクリックしてDMを送れます</p>
        <a href="chat.html" class="btn btn-secondary" style="margin-top:8px;text-decoration:none;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          チャットに戻る
        </a>
      </div>

      <div class="dm-conv-area hidden" id="dm-conv-area">
        <div class="dm-conv-header" id="dm-conv-header">
          <button class="btn-icon dm-back-btn" id="dm-back-btn" title="一覧に戻る">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
          </button>
          <div class="avatar avatar-sm" id="dm-partner-avatar"></div>
          <div class="dm-partner-info">
            <div class="dm-partner-name" id="dm-partner-name">-</div>
            <div class="dm-partner-id"   id="dm-partner-uid"></div>
          </div>
        </div>

        <div class="dm-messages" id="dm-messages">
          <div class="dm-messages-inner" id="dm-messages-inner"></div>
        </div>

        <div class="dm-input-area">
          <div class="dm-media-preview" id="dm-media-preview"></div>
          <div class="dm-input-row">
            <button class="btn-icon dm-attach-btn" id="dm-img-btn" title="画像を添付">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </button>
            <textarea id="dm-input" class="dm-textarea" placeholder="メッセージを入力…" rows="1"></textarea>
            <button class="btn btn-primary btn-sm dm-send-btn" id="dm-send-btn">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>
<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script>
let currentUser    = null;
let currentPartner = null;
let dmPendingImage = null;
let dmPollTimer    = null;
let isSending      = false;

document.addEventListener('DOMContentLoaded', async () => {
  currentUser = Storage.Session.get();
  if (!currentUser?.id) { window.location.href = 'index.html'; return; }

  renderHeader();
  await renderConvList();

  const params = new URLSearchParams(window.location.search);
  const toId   = params.get('to');
  const toName = params.get('name') || '';

  if (toId || toName) {
    const res   = await API.getDMConversations().catch(() => ({ ok: false }));
    const convs = res.ok ? (res.conversations || []) : [];
    const found = convs.find(c => c.partnerUserId === toId || c.partnerId === toId || c.partnerName === toName);
    const partner = found
      ? { id: found.partnerId, userId: found.partnerUserId||'', name: found.partnerName, color: found.partnerColor, avatarDataUrl: found.partnerAvatar||'' }
      : { id: toId||toName, userId: toId||'', name: toName||toId||'不明', color: '#4dd0e1', avatarDataUrl: '' };
    openConversation(partner);
  }

  document.getElementById('dm-send-btn').addEventListener('click', sendDM);
  document.getElementById('dm-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendDM(); }
  });
  document.getElementById('dm-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  document.getElementById('dm-img-btn').addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.addEventListener('change', () => {
      const file = input.files[0];
      if (!file) return;
      if (file.size > 5 * 1024 * 1024) { showToast('画像は5MB以下にしてください', 'error'); return; }
      const reader = new FileReader();
      reader.onload = e => { dmPendingImage = e.target.result; renderDMMediaPreview(); };
      reader.readAsDataURL(file);
    });
    input.click();
  });
  document.getElementById('dm-back-btn').addEventListener('click', () => {
    document.getElementById('dm-conv-area').classList.add('hidden');
    document.getElementById('dm-no-conv').classList.remove('hidden');
    document.getElementById('dm-sidebar').classList.remove('dm-sidebar-hidden');
    stopPoll();
  });
});

function renderHeader() {
  const av = document.getElementById('header-avatar');
  if (currentUser.avatarDataUrl) {
    av.innerHTML = `<img src="${currentUser.avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    av.style.background = 'transparent'; av.style.overflow = 'hidden';
  } else {
    av.textContent      = (currentUser.name || currentUser.nickname || '?').charAt(0).toUpperCase();
    av.style.background = (currentUser.color || '#f4a620') + '22';
    av.style.color      = currentUser.color || '#f4a620';
  }
  av.style.borderColor = currentUser.color || '#f4a620';
  document.getElementById('header-username').textContent = currentUser.name || currentUser.nickname || '';
}

async function renderConvList() {
  const list = document.getElementById('dm-conv-list');
  const res  = await API.getDMConversations().catch(() => ({ ok: false }));
  if (!res.ok) return;
  const convs = res.conversations || [];
  if (!convs.length) {
    list.innerHTML = '<div class="dm-empty-conv"><span>📭</span><p>まだメッセージはありません</p></div>';
    return;
  }
  list.innerHTML = '';
  convs.forEach(conv => {
    const color = conv.partnerColor || '#4dd0e1';
    const init  = (conv.partnerName || '?').charAt(0).toUpperCase();
    const last  = conv.lastMessage;
    let avHtml;
    if (conv.partnerAvatar) {
      avHtml = `<div class="avatar avatar-sm" style="border-color:${color};overflow:hidden;background:transparent;flex-shrink:0;"><img src="${conv.partnerAvatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>`;
    } else {
      avHtml = `<div class="avatar avatar-sm" style="background:${color}22;border-color:${color};color:${color};flex-shrink:0;">${init}</div>`;
    }
    const item = document.createElement('div');
    item.className = 'dm-conv-item' + (currentPartner?.id === conv.partnerId ? ' active' : '');
    item.dataset.partnerId = conv.partnerId;
    item.innerHTML = `
      ${avHtml}
      <div class="dm-conv-info">
        <div class="dm-conv-name">${escapeHtml(conv.partnerName || '不明')}</div>
        <div class="dm-conv-last">${last ? escapeHtml((last.text || '').substring(0, 30) || '📷 画像') : ''}</div>
      </div>
      <div class="dm-conv-meta">
        <div class="dm-conv-time">${last ? formatDMTime(new Date(last.createdAt)) : ''}</div>
        ${conv.unread > 0 ? `<div class="dm-conv-badge">${conv.unread > 99 ? '99+' : conv.unread}</div>` : ''}
      </div>`;
    item.addEventListener('click', () => openConversation({
      id: conv.partnerId, userId: conv.partnerUserId||'',
      name: conv.partnerName, color: conv.partnerColor||'#4dd0e1', avatarDataUrl: conv.partnerAvatar||''
    }));
    list.appendChild(item);
  });
}

async function openConversation(partner) {
  currentPartner = partner;
  await API.markDMRead(partner.id).catch(() => {});

  const av = document.getElementById('dm-partner-avatar');
  if (partner.avatarDataUrl) {
    av.innerHTML = `<img src="${partner.avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
    av.style.overflow = 'hidden'; av.style.background = 'transparent';
  } else {
    av.innerHTML      = (partner.name || '?').charAt(0).toUpperCase();
    av.style.background  = (partner.color || '#4dd0e1') + '22';
    av.style.color       = partner.color || '#4dd0e1';
    av.style.overflow    = '';
  }
  av.style.borderColor = partner.color || '#4dd0e1';
  document.getElementById('dm-partner-name').textContent = partner.name || '不明';
  document.getElementById('dm-partner-uid').textContent  = partner.userId ? '@' + partner.userId : '';

  document.getElementById('dm-no-conv').classList.add('hidden');
  document.getElementById('dm-conv-area').classList.remove('hidden');
  document.getElementById('dm-sidebar').classList.add('dm-sidebar-hidden');
  document.querySelectorAll('.dm-conv-item').forEach(el =>
    el.classList.toggle('active', el.dataset.partnerId === partner.id)
  );

  await renderDMMessages();
  startPoll();
}

async function renderDMMessages() {
  if (!currentPartner) return;
  const res = await API.getDMThread(currentPartner.id).catch(() => ({ ok: false }));
  if (!res.ok) return;
  const messages  = res.messages || [];
  const container = document.getElementById('dm-messages-inner');
  const scrollEl  = document.getElementById('dm-messages');
  const atBottom  = scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight < 80;
  container.innerHTML = '';

  if (!messages.length) {
    container.innerHTML = `<div class="dm-start-msg">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-muted)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>${escapeHtml(currentPartner.name || '')} さんとの会話を始めましょう</p>
    </div>`;
    return;
  }

  let lastDate = '';
  messages.forEach(msg => {
    const isOwn   = msg.fromId === currentUser.id;
    const date    = new Date(msg.createdAt);
    const dateStr = formatDMDate(date);
    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'messages-date-divider';
      div.innerHTML = `<span>${dateStr}</span>`;
      container.appendChild(div);
      lastDate = dateStr;
    }
    const row = document.createElement('div');
    row.className = `dm-msg-row${isOwn ? ' own' : ''}`;
    row.dataset.msgId = msg.id;

    const av = isOwn
      ? { color: currentUser.color||'#f4a620', avatarDataUrl: currentUser.avatarDataUrl||'', name: currentUser.name||'' }
      : { color: currentPartner.color||'#4dd0e1', avatarDataUrl: currentPartner.avatarDataUrl||'', name: currentPartner.name||'' };
    const avHtml = av.avatarDataUrl
      ? `<div class="avatar avatar-xs" style="border-color:${av.color};overflow:hidden;background:transparent;flex-shrink:0;"><img src="${av.avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>`
      : `<div class="avatar avatar-xs" style="background:${av.color}22;border-color:${av.color};color:${av.color};flex-shrink:0;">${(av.name||'?').charAt(0).toUpperCase()}</div>`;

    let bubbleContent = '';
    if (msg.text)      bubbleContent += `<div class="dm-bubble-text">${escapeHtml(msg.text).replace(/\n/g,'<br>')}</div>`;
    if (msg.imageData) bubbleContent += `<img src="${msg.imageData}" class="dm-bubble-img" onclick="this.requestFullscreen?.()">`;

    const deleteBtn = isOwn
      ? `<button class="dm-delete-btn" data-id="${msg.id}" title="削除"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg></button>` : '';

    row.innerHTML = `
      ${isOwn ? '' : avHtml}
      <div class="dm-bubble-wrap">
        <div class="dm-bubble ${isOwn ? 'own' : ''}">${bubbleContent}</div>
        <div class="dm-bubble-meta ${isOwn ? 'own' : ''}">${deleteBtn}<span class="dm-bubble-time">${formatTime(date)}</span>${isOwn ? avHtml : ''}</div>
      </div>`;
    container.appendChild(row);
  });

  container.querySelectorAll('.dm-delete-btn').forEach(btn =>
    btn.addEventListener('click', () => deleteDMMessage(btn.dataset.id))
  );
  if (atBottom) scrollEl.scrollTop = scrollEl.scrollHeight;
}

async function sendDM() {
  if (!currentPartner || isSending) return;
  const input = document.getElementById('dm-input');
  const text  = input.value.trim();
  if (!text && !dmPendingImage) return;
  isSending = true;
  document.getElementById('dm-send-btn').disabled = true;
  const payload = { toId: currentPartner.id, toName: currentPartner.name, fromName: currentUser.name||currentUser.nickname, text };
  if (dmPendingImage) { payload.imageData = dmPendingImage; dmPendingImage = null; }
  const res = await API.sendDM(payload).catch(() => ({ ok: false }));
  if (!res.ok) { showToast('送信に失敗しました', 'error'); }
  else {
    input.value = ''; input.style.height = '';
    renderDMMediaPreview();
    await renderDMMessages();
    await renderConvList();
  }
  isSending = false;
  document.getElementById('dm-send-btn').disabled = false;
}

async function deleteDMMessage(id) {
  if (!confirm('このメッセージを削除しますか？')) return;
  const res = await API.deleteDM(id).catch(() => ({ ok: false }));
  if (!res.ok) { showToast('削除に失敗しました', 'error'); return; }
  await renderDMMessages();
  await renderConvList();
}

function renderDMMediaPreview() {
  const wrap = document.getElementById('dm-media-preview');
  if (!dmPendingImage) { wrap.innerHTML = ''; wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  wrap.innerHTML = `<div style="position:relative;display:inline-block;"><img src="${dmPendingImage}" style="max-height:80px;border-radius:8px;border:1px solid var(--border);"><button onclick="dmPendingImage=null;renderDMMediaPreview();" style="position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-muted);">✕</button></div>`;
}

function startPoll() {
  stopPoll();
  dmPollTimer = setInterval(async () => { await renderDMMessages(); await renderConvList(); }, 3000);
}
function stopPoll() { if (dmPollTimer) { clearInterval(dmPollTimer); dmPollTimer = null; } }

function escapeHtml(str) {
  return String(str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
}
function formatTime(date) { return String(date.getHours()).padStart(2,'0')+':'+String(date.getMinutes()).padStart(2,'0'); }
function formatDMDate(date) {
  const now=new Date(), diff=now-date;
  if (diff<86400000 && now.getDate()===date.getDate()) return '今日';
  if (diff<172800000) return '昨日';
  return `${date.getFullYear()}/${String(date.getMonth()+1).padStart(2,'0')}/${String(date.getDate()).padStart(2,'0')}`;
}
function formatDMTime(date) {
  const now=new Date(), diff=now-date;
  if (diff<60000) return 'たった今';
  if (diff<3600000) return Math.floor(diff/60000)+'分前';
  if (diff<86400000 && now.getDate()===date.getDate()) return formatTime(date);
  return `${date.getMonth()+1}/${date.getDate()}`;
}
function showToast(msg, type='info') {
  const t=document.createElement('div'); t.className=`toast toast-${type}`; t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},3000);
}
</script>
</body>
</html>
