# ================================================================
# wrangler.toml - Cloudflare Workers 設定
# ================================================================
# ⚠️  このファイルを直接編集せず、セットアップスクリプトを使ってください:
#     npm run setup
# ================================================================

name               = "kushiro-chat-auth"
main               = "src/index.js"
compatibility_date = "2024-09-23"

# KV Namespace は npm run setup が自動で追記します
# 手動設定する場合:
#   1. npx wrangler kv namespace create TOKENS  → id を下記に
#   2. npx wrangler kv namespace create TOKENS --preview → preview_id を下記に
#   3. 下記3行のコメントを外して値を入力
#

[[kv_namespaces]]
binding    = "TOKENS"
id         = "155a6b810cd94baea42734884d365667"
preview_id = "793a84ec2e80485c88f4fdb13054db3d"

[vars]
FRONTEND_URL      = "kushiro-chat.preview-me.workers.dev"
MAIL_FROM_NAME    = "釧路コミュニティチャット"
MAIL_FROM_ADDRESS = "onboarding@resend.dev"
TOKEN_EXPIRES_SEC = "86400"

[dev]
port           = 8787
local_protocol = "http"
