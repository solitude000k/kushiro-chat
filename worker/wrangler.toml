# ================================================================
# wrangler.toml - Cloudflare Workers 設定
# 釧路コミュニティチャット メール認証Worker
# ================================================================

name       = "kushiro-chat-auth"
main       = "src/index.js"
compatibility_date = "2024-09-23"

# ---- KV Namespace ----
# デプロイ前に以下のコマンドでKVを作成してください:
#   npx wrangler kv namespace create TOKENS
# 出力された id を下記 id に設定してください
#
# ローカル開発用プレビュー:
#   npx wrangler kv namespace create TOKENS --preview
# 出力された id を preview_id に設定してください

[[kv_namespaces]]
binding    = "TOKENS"
id         = "ここにKV_IDを入力"
preview_id = "ここにPREVIEW_KV_IDを入力"

# ---- 環境変数（公開情報のみ） ----
# 機密情報はダッシュボードのSecretsに登録してください（後述）
[vars]
# フロントエンドのURL（CORS許可対象）
# 例: https://kushiro-chat.pages.dev
FRONTEND_URL = "https://your-site.pages.dev"

# 送信者表示名
MAIL_FROM_NAME = "釧路コミュニティチャット"

# 送信元メールアドレス（Resendで認証したドメインのアドレス）
# Resend無料プランの場合: onboarding@resend.dev（テスト用）
# 独自ドメイン設定後: noreply@your-domain.com
MAIL_FROM_ADDRESS = "onboarding@resend.dev"

# トークン有効期限（秒）デフォルト: 86400 = 24時間
TOKEN_EXPIRES_SEC = "86400"

# ---- ローカル開発設定 ----
[dev]
port = 8787
local_protocol = "http"
