<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント管理 ～ 釧チャ</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/account.css">
</head>
<body>

<div class="night-bg"></div>

<!-- ===== ヘッダー ===== -->
<header class="acc-header">
  <a href="chat.html" class="acc-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    チャットに戻る
  </a>
  <div class="acc-header-title">アカウント管理</div>
  <button class="btn btn-ghost btn-sm" id="logout-btn">ログアウト</button>
</header>

<!-- ===== メインコンテンツ ===== -->
<main class="acc-main">

  <!-- ---- プロフィールカード ---- -->
  <section class="acc-section" id="section-profile">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      プロフィール
    </div>

    <div class="profile-card" style="flex-direction:column;align-items:center;">
      <!-- アバター -->
      <div class="avatar-section">
        <div class="avatar-lg-wrap">
          <div class="avatar avatar-lg" id="acc-avatar"></div>
          <div class="avatar-img-wrap hidden" id="acc-avatar-img-wrap">
            <img id="acc-avatar-img" src="" alt="アバター" class="avatar-img">
          </div>
          <label class="avatar-edit-btn" for="avatar-upload" title="画像を変更">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          </label>
          <input type="file" id="avatar-upload" accept="image/*" class="hidden">
        </div>
        <div class="avatar-actions">
          <button class="btn btn-ghost btn-sm" id="avatar-remove-btn" style="display:none;">画像を削除</button>
          <p class="text-muted text-xs" style="margin-top:6px;">推奨: 正方形 / 最大2MB</p>
        </div>
      </div>

      <!-- 情報 -->
      <div class="profile-fields">
        <div class="form-group">
          <label class="form-label">ユーザーID</label>
          <input type="text" id="acc-userid" class="form-input" disabled style="opacity:.6;cursor:not-allowed;font-family:monospace;">
          <p class="text-xs text-muted" style="margin-top:4px;">ユーザーIDは変更できません</p>
        </div>
        <div class="form-group">
          <label class="form-label">ニックネーム</label>
          <input type="text" id="acc-nickname" class="form-input" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">登録メールアドレス</label>
          <input type="email" id="acc-email" class="form-input" disabled style="opacity:.5;cursor:not-allowed;">
          <p class="text-xs text-muted" style="margin-top:4px;">メールアドレスは変更できません</p>
        </div>
        <div class="form-group">
          <label class="form-label">アバターカラー</label>
          <div class="color-picker-row" id="acc-color-picker"></div>
        </div>
        <div class="form-group">
          <label class="form-label">生年月日</label>
          <input type="date" id="acc-birthdate" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">性別</label>
          <div style="display:flex;gap:16px;margin-top:4px;">
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem;">
              <input type="radio" name="acc-gender" value="male" id="gender-male"> 男性
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem;">
              <input type="radio" name="acc-gender" value="female" id="gender-female"> 女性
            </label>
            <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem;">
              <input type="radio" name="acc-gender" value="other" id="gender-other"> その他
            </label>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">自己紹介 <span class="text-muted" style="font-size:.7rem;">（100文字以内）</span></label>
          <textarea id="acc-bio" class="form-input" rows="3" maxlength="100" placeholder="自己紹介を入力してください" style="resize:vertical;"></textarea>
          <p class="text-xs text-muted" style="margin-top:3px;text-align:right;"><span id="bio-count">0</span> / 100</p>
        </div>
        <div class="form-group">
          <label class="form-label">X (Twitter) URL</label>
          <input type="url" id="acc-x-url" class="form-input" placeholder="https://x.com/username">
        </div>
        <div class="form-group">
          <label class="form-label">Instagram URL</label>
          <input type="url" id="acc-ig-url" class="form-input" placeholder="https://instagram.com/username">
        </div>
        <div class="form-group">
          <label class="form-label">Facebook URL</label>
          <input type="url" id="acc-fb-url" class="form-input" placeholder="https://facebook.com/username">
        </div>
      </div>
      <div style="width:100%;display:flex;justify-content:center;margin-top:16px;">
        <button class="btn btn-primary btn-sm" id="save-profile-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          プロフィールを保存
        </button>
      </div>
    </div>
  </section>



  <!-- ---- 投稿履歴 ---- -->
  <section class="acc-section">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      投稿履歴
      <span class="badge badge-amber" id="post-count-badge">0件</span>
    </div>

    <div class="history-filters" id="history-filters"></div>
    <div class="history-list"   id="history-list">
      <div class="empty-state-sm">
        <span>📭</span> まだ投稿がありません
      </div>
    </div>
  </section>

  <!-- ---- パスワード変更 ---- -->
  <section class="acc-section">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      パスワード変更
    </div>
    <div class="pw-change-form" style="display:flex;flex-direction:column;align-items:center;">
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-current">現在のパスワード</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-current" class="form-input" placeholder="現在のパスワード">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-current',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-new">新しいパスワード</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-new" class="form-input" placeholder="8文字以上" oninput="checkNewPwStrength(this.value)">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-new',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;">
          <div id="new-pw-fill" style="height:100%;border-radius:2px;width:0;transition:all .3s;"></div>
        </div>
        <div id="new-pw-label" style="font-size:.7rem;color:var(--text-muted);margin-top:3px;"></div>
      </div>
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-new2">新しいパスワード（確認）</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-new2" class="form-input" placeholder="同じパスワードをもう一度">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-new2',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field-error-acc hidden" id="pw-change-err" style="width:100%;max-width:360px;text-align:center;"></div>
      <button class="btn btn-secondary btn-sm" id="save-pw-btn" style="margin-top:8px;">パスワードを変更する</button>
    </div>
  </section>

  <!-- ---- 管理者パネル（Administratorのみ表示） ---- -->
  <section class="acc-section" id="admin-panel" style="display:none;border-color:rgba(239,83,80,0.35);">
    <div class="section-title" style="color:#ef5350;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      管理者パネル
      <span style="font-size:0.65rem;background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.3);padding:2px 8px;border-radius:10px;margin-left:4px;">Administrator</span>
    </div>
    <p style="font-size:0.78rem;color:var(--text-muted);margin-bottom:12px;">アカウントの強制削除が可能です。各操作には管理者パスワードの再認証が必要です。</p>

    <div style="position:relative;margin-bottom:12px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none;">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="admin-search" class="form-input" placeholder="ユーザーIDで検索…" style="padding-left:34px;"
        oninput="renderAdminPanel(this.value)">
    </div>
    <div id="admin-account-list" style="display:flex;flex-direction:column;gap:8px;"></div>
  </section>

  <!-- ---- アカウント削除 ---- -->
  <section class="acc-section" style="border-color:rgba(239,83,80,0.3);">
    <div class="section-title" style="color:#ef5350;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      アカウント削除
    </div>
    <p class="text-muted" style="font-size:.82rem;margin-bottom:16px;">アカウントを削除すると、すべての投稿履歴・プロフィール情報が失われます。この操作は取り消せません。</p>
    <div style="display:flex;justify-content:center;">
      <button class="btn btn-sm" id="delete-account-btn" style="background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.4);">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
        アカウントを削除する
      </button>
    </div>
  </section>

</main>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script>
  let currentAccount = null;
  let selectedColor = '#f4a620';

  // ---- 初期化 (D1 API版) ----
  async function init() {
    currentAccount = Storage.Session.get();
    if (!currentAccount) { window.location.href = 'index.html'; return; }

    // APIから最新のアカウントデータを取得してセッションに反映
    const res = await API.getMyAccount().catch(() => ({ ok: false }));
    if (res.ok && res.account) {
      currentAccount = { ...currentAccount, ...res.account };
      // name と nickname を統一
      if (!currentAccount.nickname) currentAccount.nickname = currentAccount.name || '';
      Storage.Session.set({ ...Storage.Session.get(), ...currentAccount });
    } else {
      // フォールバック: セッションの name を nickname に補完
      if (!currentAccount.nickname) currentAccount.nickname = currentAccount.name || '';
    }

    renderProfile();
    renderColorPicker();
    await renderHistory();
    if (currentAccount.userId === 'Administrator') {
      // 管理者パネルのセクションを表示し、認証後にロード
      document.getElementById('admin-panel').style.display = '';
      const list = document.getElementById('admin-account-list');
      list.innerHTML = `
        <div style="text-align:center;padding:16px;">
          <button id="admin-panel-load-btn" style="padding:8px 20px;background:rgba(239,83,80,0.15);color:#ef5350;border:1px solid rgba(239,83,80,0.3);border-radius:10px;cursor:pointer;font-size:.82rem;">
            🔒 管理者認証してパネルを開く
          </button>
        </div>`;
      document.getElementById('admin-panel-load-btn').addEventListener('click', () => {
        API.adminAction('管理者パネルにアクセスしますか？', () => renderAdminPanel());
      });
    }
  }

  function renderProfile() {
    document.getElementById('acc-email').value    = currentAccount.email;
    document.getElementById('acc-nickname').value = currentAccount.nickname;
    document.getElementById('acc-userid').value   = currentAccount.userId || '（旧アカウント：未設定）';

    const av = document.getElementById('acc-avatar');
    av.textContent = currentAccount.nickname.charAt(0).toUpperCase();
    av.style.background  = currentAccount.color + '22';
    av.style.borderColor = currentAccount.color;
    av.style.color       = currentAccount.color;

    if (currentAccount.avatarDataUrl) {
      document.getElementById('acc-avatar-img').src = currentAccount.avatarDataUrl;
      const imgWrap = document.getElementById('acc-avatar-img-wrap');
      imgWrap.classList.remove('hidden');
      imgWrap.style.borderColor = currentAccount.color || '#f4a620';
      document.getElementById('acc-avatar').classList.add('hidden');
      document.getElementById('avatar-remove-btn').style.display = 'inline-flex';
    }

    // 追加フィールド
    if (currentAccount.birthdate) document.getElementById('acc-birthdate').value = currentAccount.birthdate;
    if (currentAccount.gender) {
      const radio = document.querySelector(`input[name="acc-gender"][value="${currentAccount.gender}"]`);
      if (radio) radio.checked = true;
    }
    const bioEl = document.getElementById('acc-bio');
    bioEl.value = currentAccount.bio || '';
    document.getElementById('bio-count').textContent = bioEl.value.length;
    document.getElementById('acc-x-url').value  = currentAccount.xUrl  || '';
    document.getElementById('acc-ig-url').value = currentAccount.igUrl || '';
    document.getElementById('acc-fb-url').value = currentAccount.fbUrl || '';
  }

  function renderColorPicker() {
    selectedColor = currentAccount.color || '#f4a620';
    const COLORS = ['#f4a620','#4dd0e1','#ef5350','#66bb6a','#ab47bc','#42a5f5','#ff7043','#26c6da'];
    const cp = document.getElementById('acc-color-picker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('button');
      sw.type = 'button';
      sw.className = 'color-swatch-acc' + (c === selectedColor ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch-acc').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
        selectedColor = c;
        const av = document.getElementById('acc-avatar');
        av.style.background  = c + '22';
        av.style.borderColor = c;
        av.style.color       = c;
        // 画像アバターの枠色も更新
        const imgWrap = document.getElementById('acc-avatar-img-wrap');
        if (imgWrap) imgWrap.style.borderColor = c;
      });
      cp.appendChild(sw);
    });
  }

  // ---- 投稿履歴 ----
  async function renderHistory(filterRoomId = null) {
    const [msgsRes, roomsRes] = await Promise.all([
      API.listMessages('__all__').catch(() => ({ messages: [] })), // fallback
      API.listRooms().catch(() => ({ rooms: [] })),
    ]);
    // ユーザーの投稿を全掲示板から収集
    const allRooms = roomsRes.rooms || [];
    const roomMap = Object.fromEntries(allRooms.map(r => [r.id, r]));
    // 各掲示板のメッセージをまとめて取得
    const allMsgArrays = await Promise.all(allRooms.map(r => API.listMessages(r.id).catch(() => ({ messages: [] }))));
    const msgs = allMsgArrays.flatMap(r => (r.messages || []).filter(m => m.userId === currentAccount.id));

    const usedRoomIds = [...new Set(msgs.map(m => m.roomId))];
    const filterDiv = document.getElementById('history-filters');
    filterDiv.innerHTML = '';
    if (usedRoomIds.length > 1) {
      const allBtn = document.createElement('button');
      allBtn.className = 'hist-filter-btn' + (!filterRoomId ? ' active' : '');
      allBtn.textContent = 'すべて';
      allBtn.onclick = () => renderHistory(null);
      filterDiv.appendChild(allBtn);
      usedRoomIds.forEach(rid => {
        const r = roomMap[rid];
        if (!r) return;
        const btn = document.createElement('button');
        btn.className = 'hist-filter-btn' + (filterRoomId === rid ? ' active' : '');
        btn.textContent = (r.icon || '💬') + ' ' + r.name;
        btn.onclick = () => renderHistory(rid);
        filterDiv.appendChild(btn);
      });
    }

    const filtered = filterRoomId ? msgs.filter(m => m.roomId === filterRoomId) : msgs;
    filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    document.getElementById('post-count-badge').textContent = filtered.length + '件';
    const list = document.getElementById('history-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state-sm"><span>📭</span> まだ投稿がありません</div>';
      return;
    }
    list.innerHTML = '';
    filtered.forEach(msg => {
      const room = roomMap[msg.roomId];
      const item = document.createElement('div');
      item.className = 'history-item';
      const d = new Date(msg.createdAt);
      const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      item.innerHTML = `
        <div class="history-room">
          <span>${room ? (room.icon||'💬') + ' ' + room.name : '（削除済み掲示板）'}</span>
          <span class="history-date">${dateStr}</span>
        </div>
        <div class="history-text">${escapeHtml(msg.text || '')}${msg.imageData ? ' 📷' : ''}</div>
      `;
      list.appendChild(item);
    });
  }

  // ---- プロフィール保存 ----
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const nickname = document.getElementById('acc-nickname').value.trim();
    if (!nickname) { showToast('ニックネームを入力してください', 'error'); return; }
    const gender    = document.querySelector('input[name="acc-gender"]:checked')?.value || '';
    const bio       = document.getElementById('acc-bio').value.trim();
    const xUrl      = document.getElementById('acc-x-url').value.trim();
    const igUrl     = document.getElementById('acc-ig-url').value.trim();
    const fbUrl     = document.getElementById('acc-fb-url').value.trim();
    const birthdate = document.getElementById('acc-birthdate').value;
    const avatarDataUrl = currentAccount.avatarDataUrl || '';

    const res = await API.updateAccount(currentAccount.id, {
      nickname, color: selectedColor, gender, bio, xUrl, igUrl, fbUrl, birthdate, avatarDataUrl
    });
    if (!res.ok) { showToast(res.error || '保存に失敗しました', 'error'); return; }
    const updated = res.account;
    Storage.Session.set({ ...Storage.Session.get(), ...updated });
    currentAccount = { ...currentAccount, ...updated };
    renderProfile();
    renderColorPicker();
    showToast('プロフィールを保存しました', 'success');
  });

  // 自己紹介文字数カウント
  document.getElementById('acc-bio').addEventListener('input', function() {
    document.getElementById('bio-count').textContent = this.value.length;
  });

  // アカウント削除
  document.getElementById('delete-account-btn').addEventListener('click', async () => {
    const first = confirm('アカウントを削除しますか？\nすべての投稿履歴も削除されます。この操作は取り消せません。');
    if (!first) return;
    const second = confirm('本当に削除しますか？\nこの操作は元に戻せません。');
    if (!second) return;
    const res = await API.deleteAccount(currentAccount.id);
    if (!res.ok) { showToast(res.error || '削除に失敗しました', 'error'); return; }
    Storage.Session.clear();
    window.location.href = 'index.html';
  });

  // ---- 管理者パネル (D1 API版) ----
  async function renderAdminPanel(query) {
    document.getElementById('admin-panel').style.display = '';
    const list = document.getElementById('admin-account-list');
    const q    = (query || document.getElementById('admin-search')?.value || '').trim().toLowerCase();

    list.innerHTML = '<div style="text-align:center;padding:12px;font-size:.78rem;color:var(--text-muted);">読み込み中...</div>';
    const res = await API.listAccounts().catch(() => ({ ok: false, error: 'API接続エラー' }));
    if (!res.ok) {
      list.innerHTML = `<div style="text-align:center;padding:12px;font-size:.78rem;color:#ef5350;">${escapeHtml(res.error || '読み込みに失敗しました')}</div>`;
      return;
    }
    let accounts = (res.accounts || []).filter(a => a.userId !== 'Administrator');
    if (q) {
      accounts = accounts.filter(a =>
        (a.userId || '').toLowerCase().includes(q) ||
        (a.nickname || '').toLowerCase().includes(q) ||
        (a.email || '').toLowerCase().includes(q)
      );
    }
    list.innerHTML = '';
    if (!accounts.length) {
      list.innerHTML = '<div style="text-align:center;padding:16px;font-size:.8rem;color:var(--text-muted);">該当するユーザーが見つかりません</div>';
      return;
    }
    accounts.forEach(acc => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-elevated);border-radius:10px;border:1px solid var(--border);';
      const color = acc.color || '#f4a620';
      let avHtml;
      if (acc.avatarDataUrl) {
        avHtml = `<div style="width:34px;height:34px;border-radius:50%;overflow:hidden;border:2px solid ${color};flex-shrink:0;"><img src="${acc.avatarDataUrl}" style="width:100%;height:100%;object-fit:cover;"></div>`;
      } else {
        const init = (acc.nickname||'?').charAt(0).toUpperCase();
        avHtml = `<div style="width:34px;height:34px;border-radius:50%;background:${color}22;border:2px solid ${color};color:${color};display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0;">${escapeHtml(init)}</div>`;
      }
      item.innerHTML = `
        ${avHtml}
        <div style="flex:1;min-width:0;">
          <div style="font-size:.85rem;font-weight:600;color:var(--text-primary);">${escapeHtml(acc.nickname||'')}</div>
          <div style="font-size:.68rem;color:var(--text-muted);font-family:monospace;">@${escapeHtml(acc.userId||'')} · ${escapeHtml(acc.email)}</div>
        </div>
        <button class="admin-del-acc-btn" data-id="${acc.id}" data-name="${escapeHtml(acc.nickname||acc.email)}"
          style="padding:5px 10px;background:rgba(239,83,80,0.12);color:#ef5350;border:1px solid rgba(239,83,80,0.3);border-radius:8px;cursor:pointer;font-size:.72rem;white-space:nowrap;flex-shrink:0;">
          削除
        </button>`;
      list.appendChild(item);
    });

    list.querySelectorAll('.admin-del-acc-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const accId   = btn.dataset.id;
        const accName = btn.dataset.name;
        API.adminAction(`「${accName}」のアカウントを強制削除しますか？\nそのユーザーのメッセージも全て削除されます。`, async () => {
          const r = await API.adminDeleteAccount(accId);
          if (r.ok) { showToast(`「${accName}」を削除しました`, 'success'); await renderAdminPanel(); }
          else showToast(r.error || '削除に失敗しました', 'error');
        });
      });
    });
  }


    function escapeHtml(str) {
    return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  }

  // ---- アバター画像 ----
  document.getElementById('avatar-upload').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { showToast('画像は2MB以下にしてください', 'error'); return; }
    const reader = new FileReader();
    reader.onload = async e => {
      const dataUrl = e.target.result;
      document.getElementById('acc-avatar-img').src = dataUrl;
      document.getElementById('acc-avatar-img-wrap').classList.remove('hidden');
      document.getElementById('acc-avatar').classList.add('hidden');
      document.getElementById('avatar-remove-btn').style.display = 'inline-flex';
      const avRes = await API.updateAccount(currentAccount.id, { avatarDataUrl: dataUrl });
      const updated = avRes.ok ? avRes.account : currentAccount;
      Storage.Session.set({ ...Storage.Session.get(), avatarDataUrl: updated.avatarDataUrl || '' });
      currentAccount = { ...currentAccount, ...updated };
      showToast('アイコン画像を変更しました', 'success');
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('avatar-remove-btn').addEventListener('click', async () => {
    await API.updateAccount(currentAccount.id, { avatarDataUrl: '' });
    const updated = { ...currentAccount, avatarDataUrl: '' };
    Storage.Session.set({ ...Storage.Session.get(), avatarDataUrl: '' });
    currentAccount = { ...currentAccount, avatarDataUrl: '' };
    document.getElementById('acc-avatar-img-wrap').classList.add('hidden');
    document.getElementById('acc-avatar').classList.remove('hidden');
    document.getElementById('avatar-remove-btn').style.display = 'none';
    showToast('アイコン画像を削除しました', 'success');
  });

  // ---- パスワード変更 ----
  function checkNewPwStrength(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
      {w:'20%',c:'#ef5350',t:'弱い'},{w:'40%',c:'#ff7043',t:'普通'},
      {w:'60%',c:'#ffa726',t:'まあまあ'},{w:'80%',c:'#66bb6a',t:'強い'},{w:'100%',c:'#4dd0e1',t:'非常に強い'}
    ];
    const s = map[Math.max(0,score-1)]||map[0];
    const fill = document.getElementById('new-pw-fill');
    fill.style.width = pw ? s.w : '0';
    fill.style.background = s.c;
    document.getElementById('new-pw-label').textContent = pw ? `強度: ${s.t}` : '';
  }

  function togglePwField(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.style.color = show ? 'var(--amber)' : '';
  }

  document.getElementById('save-pw-btn').addEventListener('click', async () => {
    const cur  = document.getElementById('pw-current').value;
    const nw   = document.getElementById('pw-new').value;
    const nw2  = document.getElementById('pw-new2').value;
    const errEl = document.getElementById('pw-change-err');
    errEl.classList.add('hidden');

    if (!cur)  { showPwErr('現在のパスワードを入力してください'); return; }
    if (nw.length < 8) { showPwErr('新しいパスワードは8文字以上にしてください'); return; }
    if (nw !== nw2) { showPwErr('新しいパスワードが一致しません'); return; }

    try {
      const currentHash = await Storage.sha256(cur);
      if (currentHash !== currentAccount.passwordHash) { showPwErr('現在のパスワードが正しくありません'); return; }
      const newHash = await Storage.sha256(nw);
      const updated = await API.updateAccount(currentAccount.id, { passwordHash: newHash });
      Storage.Session.set(updated);
      currentAccount = updated;
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value     = '';
      document.getElementById('pw-new2').value    = '';
      showToast('パスワードを変更しました', 'success');
    } catch (e) { showPwErr(e.message); }
  });

  function showPwErr(msg) {
    const el = document.getElementById('pw-change-err');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  // ---- ログアウト ----
  document.getElementById('logout-btn').addEventListener('click', () => {
    if (confirm('ログアウトしますか？')) {
      Storage.Session.clear();
      window.location.href = 'index.html';
    }
  });

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  }

  function showToast(msg, type = '') {
    const ct = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    ct.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  init();
</script>
</body>
</html>
