<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アカウント管理 ～ 釧チャ</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/account.css">
</head>
<body>

<div class="night-bg"></div>

<!-- ===== ヘッダー ===== -->
<header class="acc-header">
  <a href="chat.html" class="acc-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    チャットに戻る
  </a>
  <div class="acc-header-title">アカウント管理</div>
  <button class="btn btn-ghost btn-sm" id="logout-btn">ログアウト</button>
</header>

<!-- ===== メインコンテンツ ===== -->
<main class="acc-main">

  <!-- ---- プロフィールカード ---- -->
  <section class="acc-section" id="section-profile">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      プロフィール
    </div>

    <div class="profile-card" style="flex-direction:column;align-items:center;">
      <!-- アバター -->
      <div class="avatar-section">
        <div class="avatar-lg-wrap">
          <div class="avatar avatar-lg" id="acc-avatar"></div>
          <div class="avatar-img-wrap hidden" id="acc-avatar-img-wrap">
            <img id="acc-avatar-img" src="" alt="アバター" class="avatar-img">
          </div>
          <label class="avatar-edit-btn" for="avatar-upload" title="画像を変更">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          </label>
          <input type="file" id="avatar-upload" accept="image/*" class="hidden">
        </div>
        <div class="avatar-actions">
          <button class="btn btn-ghost btn-sm" id="avatar-remove-btn" style="display:none;">画像を削除</button>
          <p class="text-muted text-xs" style="margin-top:6px;">推奨: 正方形 / 最大2MB</p>
        </div>
      </div>

      <!-- 情報 -->
      <div class="profile-fields">
        <div class="form-group">
          <label class="form-label">ニックネーム</label>
          <input type="text" id="acc-nickname" class="form-input" maxlength="20">
        </div>
        <div class="form-group">
          <label class="form-label">登録メールアドレス</label>
          <input type="email" id="acc-email" class="form-input" disabled style="opacity:.5;cursor:not-allowed;">
          <p class="text-xs text-muted" style="margin-top:4px;">メールアドレスは変更できません</p>
        </div>
        <div class="form-group">
          <label class="form-label">アバターカラー</label>
          <div class="color-picker-row" id="acc-color-picker"></div>
        </div>
      </div>
      <div style="width:100%;display:flex;justify-content:center;margin-top:16px;">
        <button class="btn btn-primary btn-sm" id="save-profile-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
          プロフィールを保存
        </button>
      </div>
    </div>
  </section>



  <!-- ---- 投稿履歴 ---- -->
  <section class="acc-section">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      投稿履歴
      <span class="badge badge-amber" id="post-count-badge">0件</span>
    </div>

    <div class="history-filters" id="history-filters"></div>
    <div class="history-list"   id="history-list">
      <div class="empty-state-sm">
        <span>📭</span> まだ投稿がありません
      </div>
    </div>
  </section>

  <!-- ---- パスワード変更 ---- -->
  <section class="acc-section">
    <div class="section-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      パスワード変更
    </div>
    <div class="pw-change-form" style="display:flex;flex-direction:column;align-items:center;">
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-current">現在のパスワード</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-current" class="form-input" placeholder="現在のパスワード">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-current',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-new">新しいパスワード</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-new" class="form-input" placeholder="8文字以上" oninput="checkNewPwStrength(this.value)">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-new',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div style="height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;">
          <div id="new-pw-fill" style="height:100%;border-radius:2px;width:0;transition:all .3s;"></div>
        </div>
        <div id="new-pw-label" style="font-size:.7rem;color:var(--text-muted);margin-top:3px;"></div>
      </div>
      <div class="form-group" style="width:100%;max-width:360px;">
        <label class="form-label" for="pw-new2">新しいパスワード（確認）</label>
        <div class="input-wrap-rel">
          <input type="password" id="pw-new2" class="form-input" placeholder="同じパスワードをもう一度">
          <button type="button" class="pw-toggle-btn" onclick="togglePwField('pw-new2',this)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="field-error-acc hidden" id="pw-change-err" style="width:100%;max-width:360px;text-align:center;"></div>
      <button class="btn btn-secondary btn-sm" id="save-pw-btn" style="margin-top:8px;">パスワードを変更する</button>
    </div>
  </section>

</main>

<div id="toast-container"></div>

<script src="js/storage.js"></script>
<script>
  let currentAccount = null;
  let selectedColor = '#f4a620';

  // ---- 初期化 ----
  function init() {
    currentAccount = Storage.Session.get();
    if (!currentAccount) { window.location.href = 'index.html'; return; }
    // 最新アカウント情報を取得
    const latest = Storage.Accounts.findById(currentAccount.id);
    if (latest) { currentAccount = latest; Storage.Session.set(latest); }

    renderProfile();
    renderColorPicker();
    renderHistory();
  }

  function renderProfile() {
    document.getElementById('acc-email').value    = currentAccount.email;
    document.getElementById('acc-nickname').value = currentAccount.nickname;

    const av = document.getElementById('acc-avatar');
    av.textContent = currentAccount.nickname.charAt(0).toUpperCase();
    av.style.background  = currentAccount.color + '22';
    av.style.borderColor = currentAccount.color;
    av.style.color       = currentAccount.color;

    if (currentAccount.avatarDataUrl) {
      document.getElementById('acc-avatar-img').src = currentAccount.avatarDataUrl;
      const imgWrap = document.getElementById('acc-avatar-img-wrap');
      imgWrap.classList.remove('hidden');
      imgWrap.style.borderColor = currentAccount.color || '#f4a620';
      document.getElementById('acc-avatar').classList.add('hidden');
      document.getElementById('avatar-remove-btn').style.display = 'inline-flex';
    }
  }

  function renderColorPicker() {
    selectedColor = currentAccount.color || '#f4a620';
    const COLORS = ['#f4a620','#4dd0e1','#ef5350','#66bb6a','#ab47bc','#42a5f5','#ff7043','#26c6da'];
    const cp = document.getElementById('acc-color-picker');
    cp.innerHTML = '';
    COLORS.forEach(c => {
      const sw = document.createElement('button');
      sw.type = 'button';
      sw.className = 'color-swatch-acc' + (c === selectedColor ? ' selected' : '');
      sw.style.background = c;
      sw.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch-acc').forEach(s => s.classList.remove('selected'));
        sw.classList.add('selected');
        selectedColor = c;
        const av = document.getElementById('acc-avatar');
        av.style.background  = c + '22';
        av.style.borderColor = c;
        av.style.color       = c;
        // 画像アバターの枠色も更新
        const imgWrap = document.getElementById('acc-avatar-img-wrap');
        if (imgWrap) imgWrap.style.borderColor = c;
      });
      cp.appendChild(sw);
    });
  }

  // ---- 投稿履歴 ----
  function renderHistory(filterRoomId = null) {
    const msgs  = Storage.Messages.getByUser(currentAccount.id);
    const rooms = Storage.Rooms.getAll();
    const roomMap = Object.fromEntries(rooms.map(r => [r.id, r]));

    // フィルターボタン
    const usedRoomIds = [...new Set(msgs.map(m => m.roomId))];
    const filterDiv = document.getElementById('history-filters');
    filterDiv.innerHTML = '';
    if (usedRoomIds.length > 1) {
      const allBtn = document.createElement('button');
      allBtn.className = 'hist-filter-btn' + (!filterRoomId ? ' active' : '');
      allBtn.textContent = 'すべて';
      allBtn.onclick = () => renderHistory(null);
      filterDiv.appendChild(allBtn);
      usedRoomIds.forEach(rid => {
        const r = roomMap[rid];
        if (!r) return;
        const btn = document.createElement('button');
        btn.className = 'hist-filter-btn' + (filterRoomId === rid ? ' active' : '');
        btn.textContent = (r.icon || '💬') + ' ' + r.name;
        btn.onclick = () => renderHistory(rid);
        filterDiv.appendChild(btn);
      });
    }

    const filtered = filterRoomId ? msgs.filter(m => m.roomId === filterRoomId) : msgs;
    filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt));

    document.getElementById('post-count-badge').textContent = filtered.length + '件';
    const list = document.getElementById('history-list');
    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state-sm"><span>📭</span> まだ投稿がありません</div>';
      return;
    }
    list.innerHTML = '';
    filtered.forEach(msg => {
      const room = roomMap[msg.roomId];
      const item = document.createElement('div');
      item.className = 'history-item';
      const d = new Date(msg.createdAt);
      const dateStr = `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      item.innerHTML = `
        <div class="history-room">
          <span>${room ? (room.icon||'💬') + ' ' + room.name : '（削除済み掲示板）'}</span>
          <span class="history-date">${dateStr}</span>
        </div>
        <div class="history-text">${escapeHtml(msg.text || '')}${msg.imageData ? ' 📷' : ''}${msg.videoData ? ' 🎬' : ''}</div>
        ${msg.tags ? `<div class="history-tags">${msg.tags.split(',').filter(Boolean).map(t=>`<span class="badge badge-cyan">${escapeHtml(t.trim())}</span>`).join('')}</div>` : ''}
      `;
      list.appendChild(item);
    });
  }

  // ---- プロフィール保存 ----
  document.getElementById('save-profile-btn').addEventListener('click', async () => {
    const nickname = document.getElementById('acc-nickname').value.trim();
    if (!nickname) { showToast('ニックネームを入力してください', 'error'); return; }
    const updated = Storage.Accounts.update(currentAccount.id, { nickname, color: selectedColor });
    Storage.Users.upsert(updated);
    Storage.Session.set(updated);
    currentAccount = updated;
    showToast('プロフィールを保存しました', 'success');
  });

  // ---- アバター画像 ----
  document.getElementById('avatar-upload').addEventListener('change', function () {
    const file = this.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { showToast('画像は2MB以下にしてください', 'error'); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      document.getElementById('acc-avatar-img').src = dataUrl;
      document.getElementById('acc-avatar-img-wrap').classList.remove('hidden');
      document.getElementById('acc-avatar').classList.add('hidden');
      document.getElementById('avatar-remove-btn').style.display = 'inline-flex';
      const updated = Storage.Accounts.update(currentAccount.id, { avatarDataUrl: dataUrl });
      Storage.Users.upsert(updated);
      Storage.Session.set(updated);
      currentAccount = updated;
      showToast('アイコン画像を変更しました', 'success');
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('avatar-remove-btn').addEventListener('click', () => {
    const updated = Storage.Accounts.update(currentAccount.id, { avatarDataUrl: '' });
    Storage.Users.upsert(updated);
    Storage.Session.set(updated);
    currentAccount = updated;
    document.getElementById('acc-avatar-img-wrap').classList.add('hidden');
    document.getElementById('acc-avatar').classList.remove('hidden');
    document.getElementById('avatar-remove-btn').style.display = 'none';
    showToast('アイコン画像を削除しました', 'success');
  });

  // ---- パスワード変更 ----
  function checkNewPwStrength(pw) {
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
      {w:'20%',c:'#ef5350',t:'弱い'},{w:'40%',c:'#ff7043',t:'普通'},
      {w:'60%',c:'#ffa726',t:'まあまあ'},{w:'80%',c:'#66bb6a',t:'強い'},{w:'100%',c:'#4dd0e1',t:'非常に強い'}
    ];
    const s = map[Math.max(0,score-1)]||map[0];
    const fill = document.getElementById('new-pw-fill');
    fill.style.width = pw ? s.w : '0';
    fill.style.background = s.c;
    document.getElementById('new-pw-label').textContent = pw ? `強度: ${s.t}` : '';
  }

  function togglePwField(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.style.color = show ? 'var(--amber)' : '';
  }

  document.getElementById('save-pw-btn').addEventListener('click', async () => {
    const cur  = document.getElementById('pw-current').value;
    const nw   = document.getElementById('pw-new').value;
    const nw2  = document.getElementById('pw-new2').value;
    const errEl = document.getElementById('pw-change-err');
    errEl.classList.add('hidden');

    if (!cur)  { showPwErr('現在のパスワードを入力してください'); return; }
    if (nw.length < 8) { showPwErr('新しいパスワードは8文字以上にしてください'); return; }
    if (nw !== nw2) { showPwErr('新しいパスワードが一致しません'); return; }

    try {
      const currentHash = await Storage.sha256(cur);
      if (currentHash !== currentAccount.passwordHash) { showPwErr('現在のパスワードが正しくありません'); return; }
      const newHash = await Storage.sha256(nw);
      const updated = Storage.Accounts.update(currentAccount.id, { passwordHash: newHash });
      Storage.Session.set(updated);
      currentAccount = updated;
      document.getElementById('pw-current').value = '';
      document.getElementById('pw-new').value     = '';
      document.getElementById('pw-new2').value    = '';
      showToast('パスワードを変更しました', 'success');
    } catch (e) { showPwErr(e.message); }
  });

  function showPwErr(msg) {
    const el = document.getElementById('pw-change-err');
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  // ---- ログアウト ----
  document.getElementById('logout-btn').addEventListener('click', () => {
    if (confirm('ログアウトしますか？')) {
      Storage.Session.clear();
      window.location.href = 'index.html';
    }
  });

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
  }

  function showToast(msg, type = '') {
    const ct = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    ct.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  init();
</script>
</body>
</html>
