<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2340" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060c18" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dd0e1" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#4dd0e1" stop-opacity="0.02"/>
    </radialGradient>
  </defs>

  <!-- 外側の円 -->
  <circle cx="100" cy="100" r="92" fill="url(#bgGlow)" stroke="#f4a620" stroke-width="1.5" stroke-opacity="0.5"/>

  <!-- 家の壁 (x:50〜150, y:96〜158) -->
  <rect x="50" y="96" width="100" height="62" rx="2"
        fill="#0d1628" stroke="#f4a620" stroke-width="1.5"/>

  <!-- 屋根 -->
  <polygon points="40,98 100,52 160,98"
           fill="#f4a620" opacity="0.9"/>
  <polygon points="40,98 100,52 160,98"
           fill="none" stroke="#ffe082" stroke-width="1" stroke-opacity="0.5"/>

  <!-- 煙突 -->
  <rect x="70" y="60" width="13" height="24" rx="1"
        fill="#1a2340" stroke="#f4a620" stroke-width="1.2"/>

  <!-- モニター本体 (幅68, 高38, 中央x=100, 上y=105) -->
  <rect x="66" y="105" width="68" height="38" rx="4"
        fill="#08111e" stroke="#4dd0e1" stroke-width="1.8"/>

  <!-- 画面グロー -->
  <rect x="71" y="110" width="58" height="27" rx="2"
        fill="url(#screenGlow)"/>

  <!-- 画面 -->
  <rect x="71" y="110" width="58" height="27" rx="2"
        fill="#03090f" stroke="#4dd0e1" stroke-width="0.7" stroke-opacity="0.5"/>

  <!-- 画面内コンテンツ -->
  <rect x="77" y="116" width="28" height="3" rx="1.5" fill="#4dd0e1" opacity="0.9"/>
  <rect x="77" y="122" width="40" height="3" rx="1.5" fill="#f4a620" opacity="0.75"/>
  <rect x="77" y="128" width="20" height="3" rx="1.5" fill="#4dd0e1" opacity="0.5"/>

  <!-- スタンド -->
  <rect x="96" y="143" width="8" height="7" rx="1" fill="#4dd0e1" opacity="0.65"/>
  <!-- 台座 -->
  <rect x="83" y="150" width="34" height="4" rx="2" fill="#4dd0e1" opacity="0.45"/>

  <!-- ドア (左下) -->
  <rect x="56" y="126" width="20" height="32" rx="2"
        fill="#0a1a30" stroke="#f4a620" stroke-width="1" stroke-opacity="0.6"/>
  <circle cx="72" cy="143" r="2" fill="#f4a620" opacity="0.8"/>

  <!-- 窓 (右下) -->
  <rect x="124" y="116" width="20" height="18" rx="2"
        fill="#051828" stroke="#4dd0e1" stroke-width="1" stroke-opacity="0.7"/>
  <line x1="134" y1="116" x2="134" y2="134" stroke="#4dd0e1" stroke-width="0.8" stroke-opacity="0.45"/>
  <line x1="124" y1="125" x2="144" y2="125" stroke="#4dd0e1" stroke-width="0.8" stroke-opacity="0.45"/>

  <!-- 地面ライン -->
  <line x1="36" y1="158" x2="164" y2="158" stroke="#f4a620" stroke-width="1" stroke-opacity="0.25"/>

  <!-- 装飾の小さな星 -->
  <circle cx="33"  cy="75"  r="1.5" fill="#f4a620" opacity="0.55"/>
  <circle cx="167" cy="70"  r="1.5" fill="#4dd0e1" opacity="0.55"/>
  <circle cx="26"  cy="120" r="1"   fill="#4dd0e1" opacity="0.35"/>
  <circle cx="174" cy="115" r="1"   fill="#f4a620" opacity="0.35"/>
</svg>
