<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>釧チャ ～ 釧路コミュニティチャット</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/chat.css">

<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9350505956759257" crossorigin="anonymous"></script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-5MBEHVJVDS"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-5MBEHVJVDS');
</script>
</head>
<body>

<div class="night-bg"></div>

<!-- ======= アプリレイアウト ======= -->
<div class="app-layout">

  <!-- ===== ヘッダー ===== -->
  <header class="app-header">
    <div style="display:flex;align-items:center;gap:12px;">
      <!-- モバイル：サイドバートグル -->
      <button class="btn-icon header-menu-btn" id="sidebar-toggle" aria-label="メニュー">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <a href="index.html" class="header-brand">
        <img src="images/logo.svg" alt="ロゴ">
        <div>
          <div class="header-brand-text">釧チャ</div>
          <div class="header-brand-sub">釧路コミュニティチャット</div>
        </div>
      </a>
    </div>


    <!-- ナビゲーション -->
    <nav style="display:flex;align-items:center;gap:4px;">
      <a href="news.html" class="nav-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><span>ニュース</span></a>
      <a href="chat.html" class="nav-item active"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span>掲示板</span></a>
      <a href="dm.html" class="nav-item" style="position:relative;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="12" y1="7" x2="12" y2="13"/></svg><span>DM</span></a>
      <a href="random.html" class="nav-item"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg><span>ランダム</span></a>
    </nav>
    <div class="header-actions">
      <div class="header-user" id="user-menu-trigger" style="position:relative;">
        <div style="position:relative;display:inline-flex;"><div class="avatar avatar-sm" id="header-avatar"></div><span id="dm-header-badge" style="display:none;position:absolute;top:-3px;right:-3px;width:10px;height:10px;background:#ef5350;border-radius:50%;border:2px solid var(--bg-dark);"></span></div>
        <span class="header-user-name" id="header-username"></span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--text-muted)">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>

      <!-- ユーザーメニューのドロップダウン -->
      <div id="user-dropdown" class="hidden" style="
        position:absolute;top:56px;right:20px;
        background:var(--bg-card);border:1px solid var(--border-amber);
        border-radius:var(--radius-md);padding:8px;
        min-width:176px;box-shadow:var(--shadow-md);z-index:200;
      ">
        <a href="account.html" class="btn-icon w-full" style="justify-content:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);text-decoration:none;display:flex;align-items:center;white-space:nowrap;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
          アカウント管理
        </a>
        <div id="admin-page-menu-item" style="display:none;">
          <a href="admin.html" class="btn-icon w-full" style="justify-content:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);text-decoration:none;display:flex;align-items:center;white-space:nowrap;color:#ef5350;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            管理者ページ
          </a>
        </div>
        <div style="height:1px;background:var(--border);margin:4px 0;"></div>
        <button id="logout-btn" class="btn-icon w-full" style="justify-content:flex-start;gap:8px;padding:8px 12px;border-radius:var(--radius-sm);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/>
          </svg>
          ログアウト
        </button>
      </div>
    </div>
  </header>

  <!-- ===== サイドバー ===== -->
  <aside class="sidebar" id="sidebar">

    <!-- カテゴリフィルター -->
    <div id="category-filters" class="category-filters"></div>

    <!-- ルーム一覧ヘッダー -->
    <div class="sidebar-section" style="padding:12px 16px 0;">
      <div class="sidebar-title">
        <span>掲示板</span>
        <button class="btn-icon" id="new-room-btn" title="新しい掲示板を作成" style="padding:3px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- ルームリスト -->
    <div class="room-list" id="room-list"></div>

    <!-- サイドバー広告 -->
    <div style="padding:10px 12px 0;flex-shrink:0;">
      <!-- GoogleAdSense01 -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-9350505956759257"
           data-ad-slot="2112065815"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <!-- サイドバーフッター -->
    <div class="sidebar-section" style="margin-top:auto;">
      <div style="font-size:0.7rem;color:var(--text-muted);text-align:center;line-height:1.8;">
        🌊 釧路市地域コミュニティ<br>
        <span id="sidebar-msg-count" style="color:var(--amber);"></span>
      </div>
    </div>
  </aside>

  <!-- ===== メインチャット ===== -->
  <main class="chat-area">

    <!-- ルーム未選択状態 -->
    <div id="no-room-state" class="no-room-state">
      <div class="big-icon">🌊</div>
      <h2>掲示板を選んでください</h2>
      <p>左のリストから参加したい掲示板を選ぶか、<br>新しい掲示板を作成してください</p>
      <button class="btn btn-primary" id="new-room-btn-center">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        新しい掲示板を作成
      </button>
    </div>

    <!-- チャット本体（ルーム選択後） -->
    <div id="chat-main" class="hidden" style="display:flex;flex-direction:column;height:100%;overflow:hidden;">

      <!-- チャットヘッダー -->
      <div class="chat-header">
        <div class="chat-room-info">
          <span class="chat-room-icon" id="chat-room-icon">💬</span>
          <div>
            <div class="chat-room-name" id="chat-room-name"></div>
            <div class="chat-room-desc" id="chat-room-desc"></div>
            <div class="chat-room-tags" id="chat-room-tags"></div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;">
          <span class="auto-delete-notice" style="font-size:0.7rem;color:var(--text-muted);opacity:0.7;white-space:nowrap;">掲示板は72時間更新がないと自動で削除されます</span>
          <span id="online-count" style="font-size:0.75rem;color:var(--text-muted);"></span>
        </div>
      </div>

      <!-- タイピングインジケーター -->
      <div class="typing-indicator" id="typing-indicator" style="opacity:0;"></div>

      <!-- メッセージ一覧 -->
      <div class="messages-container" id="messages-container"></div>

      <!-- 入力エリア -->
      <div class="input-area">
        <!-- プレビュー（メディア添付時） -->
        <div class="input-previews" id="input-previews"></div>
        <!-- 入力行 -->
        <div class="input-row">
          <textarea
            id="message-input"
            class="message-textarea"
            placeholder="掲示板を選んでメッセージを送ろう"
            rows="1"
            disabled
          ></textarea>

          <div class="input-tools">
            <button class="btn-icon" id="attach-image-btn" title="画像を添付">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </button>

            <button class="send-btn" id="send-btn" title="送信 (Enter)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
        <!-- スマホ用注意書き -->
        <div class="auto-delete-notice-mobile">掲示板は72時間更新がないと自動で削除されます</div>
      </div>
    </div>
  </main>
</div>

<!-- ===== モバイルサイドバーオーバーレイ ===== -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- ===== 新規掲示板作成モーダル ===== -->
<div class="modal-overlay" id="new-room-modal">
  <div class="modal" style="max-width:500px;">
    <div class="modal-header">
      <h3 style="font-family:var(--font-serif);color:var(--amber);">
        ＋ 新しい掲示板を作成
      </h3>
      <button class="btn-icon" id="new-room-cancel">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <form id="new-room-form" onsubmit="return false;" style="display:flex;flex-direction:column;gap:16px;">

      <!-- アイコン選択 -->
      <div class="form-group">
        <label class="form-label">アイコン</label>
        <div class="icon-grid">
          <button type="button" class="icon-option" data-icon="💬">💬</button>
          <button type="button" class="icon-option" data-icon="🌊">🌊</button>
          <button type="button" class="icon-option" data-icon="🦀">🦀</button>
          <button type="button" class="icon-option" data-icon="🌿">🌿</button>
          <button type="button" class="icon-option" data-icon="🌫️">🌫️</button>
          <button type="button" class="icon-option" data-icon="📢">📢</button>
          <button type="button" class="icon-option" data-icon="🍜">🍜</button>
          <button type="button" class="icon-option" data-icon="🚢">🚢</button>
          <button type="button" class="icon-option" data-icon="⛩️">⛩️</button>
          <button type="button" class="icon-option" data-icon="🦢">🦢</button>
          <button type="button" class="icon-option" data-icon="❄️">❄️</button>
          <button type="button" class="icon-option" data-icon="🎣">🎣</button>
          <button type="button" class="icon-option" data-icon="🏔️">🏔️</button>
          <button type="button" class="icon-option" data-icon="🌸">🌸</button>
          <button type="button" class="icon-option" data-icon="💡">💡</button>
          <button type="button" class="icon-option" data-icon="🎉">🎉</button>
          <button type="button" class="icon-option" data-icon="🐻">🐻</button>
          <button type="button" class="icon-option" data-icon="🌺">🌺</button>
          <button type="button" class="icon-option" data-icon="🏠">🏠</button>
          <button type="button" class="icon-option" data-icon="🎵">🎵</button>
          <button type="button" class="icon-option" data-icon="⚽">⚽</button>
          <button type="button" class="icon-option" data-icon="📸">📸</button>
          <button type="button" class="icon-option" data-icon="🐕">🐕</button>
          <button type="button" class="icon-option" data-icon="🌙">🌙</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="new-room-name">掲示板名 <span style="color:#ef5350">*</span></label>
        <input type="text" id="new-room-name" class="form-input" placeholder="例：釧路グルメ情報" maxlength="40" oninput="sanitizeTextInput(this)">
      </div>

      <div class="form-group">
        <label class="form-label" for="new-room-tags">タグ（カンマ区切り） <span style="color:#ef5350">*</span></label>
        <input type="text" id="new-room-tags" class="form-input"
          placeholder="例：グルメ,海鮮,ランチ"
          maxlength="100"
          oninput="sanitizeTagInput(this)" maxlength="60">
        <p id="tag-hint" style="font-size:.72rem;color:var(--text-muted);margin-top:4px;">タグ: <span id="tag-count">0</span>/3個（カンマ区切り・最大3つ）</p>
      </div>

      <div class="form-group">
        <label class="form-label" for="new-room-desc">説明</label>
        <textarea id="new-room-desc" class="form-textarea" placeholder="この掲示板について説明してください" rows="2" maxlength="100" oninput="sanitizeTextInput(this);document.getElementById('desc-count').textContent=this.value.length"></textarea>
        <p style="font-size:.72rem;color:var(--text-muted);margin-top:4px;text-align:right;"><span id="desc-count">0</span>/100文字</p>
      </div>

      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button type="button" class="btn btn-ghost" id="new-room-cancel-bottom">キャンセル</button>
        <button type="button" class="btn btn-primary" id="new-room-submit">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          作成する
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ===== ライトボックス ===== -->
<div id="lightbox" class="lightbox">
  <button class="btn btn-ghost lightbox-close" onclick="closeLightbox()">✕ 閉じる</button>
  <img src="" alt="拡大表示">
</div>

<!-- ===== トースト通知 ===== -->
<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/api.js"></script>
<script src="js/chat.js"></script>
<script>
  // new-room-btn と new-room-btn-center は chat.js の setupEventListeners で登録済み
  // new-room-cancel-bottom はchat.jsに未登録なので追加
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('new-room-cancel-bottom')?.addEventListener('click', closeNewRoomModal);
  });
</script>

  <script src="js/effects.js"></script>
</body>
</html>
