<!DOCTYPE html>
<html lang="ja">
<head>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>釧チャ ～ 釧路コミュニティチャット</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow: hidden; }

    canvas#star-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .mist {
      position: fixed; bottom: 0; left: 0; right: 0; height: 35%;
      background: linear-gradient(to top, rgba(6,20,40,.9) 0%, rgba(10,25,50,.5) 50%, transparent 100%);
      z-index: 1; pointer-events: none;
    }
    .ambient-lights { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    .ambient-light { position: absolute; border-radius: 50%; filter: blur(60px); }
    .light-amber { width: 300px; height: 200px; background: rgba(244,166,32,.06); bottom: 10%; left: 10%; }
    .light-cyan  { width: 250px; height: 150px; background: rgba(77,208,225,.05); bottom: 15%; right: 15%; }

    /* ---- Login card ---- */
    .login-page {
      position: relative; z-index: 10;
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow-y: auto; padding: 20px;
    }
    .login-card {
      width: 100%; max-width: 440px;
    }
    .login-box {
      background: rgba(14, 20, 40, 0.92);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-amber);
      border-radius: var(--radius-xl);
      padding: 36px 40px 32px;
      box-shadow: 0 0 60px rgba(244,166,32,.08), 0 20px 60px rgba(0,0,0,.6);
    }
    .login-header { text-align: center; margin-bottom: 28px; }
    .login-logo { width: 64px; height: 64px; margin: 0 auto 14px; animation: pulse-amber 3s ease-in-out infinite; }
    .login-title { font-family: var(--font-serif); font-size: 1.4rem; font-weight: 700; color: var(--amber); letter-spacing: .04em; line-height: 1.3; }
    .login-subtitle { font-size: .72rem; color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase; margin-top: 4px; }

    /* ---- Tabs ---- */
    .auth-tabs {
      display: flex; gap: 0;
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 4px; margin-bottom: 24px;
    }
    .auth-tab {
      flex: 1; padding: 9px;
      background: none; border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: .85rem; font-weight: 500;
      color: var(--text-muted);
      cursor: pointer; transition: all var(--transition);
    }
    .auth-tab.active {
      background: var(--bg-card);
      color: var(--amber);
      box-shadow: 0 0 12px rgba(244,166,32,.1);
    }

    /* ---- Form panel ---- */
    .auth-panel { display: none; flex-direction: column; gap: 14px; }
    .auth-panel.active { display: flex; }

    /* ---- Avatar preview ---- */
    .avatar-preview {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: all var(--transition);
    }
    .avatar-preview.filled { border-color: var(--border-amber); }
    #reg-avatar-preview {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700;
      border: 2px solid var(--text-muted);
      color: var(--text-muted); background: var(--bg-card);
      flex-shrink: 0; transition: all var(--transition);
    }
    .preview-nickname { font-size: .9rem; color: var(--text-secondary); font-weight: 500; }
    .preview-email    { font-size: .7rem; color: var(--text-muted); margin-top: 2px; }

    /* ---- Color picker ---- */
    .color-picker { display: flex; gap: 7px; flex-wrap: wrap; }
    .color-swatch {
      width: 26px; height: 26px; border-radius: 50%;
      border: 2px solid transparent; cursor: pointer;
      transition: all var(--transition); outline: none;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,.3); transform: scale(1.1); }

    /* ---- Password strength ---- */
    .pw-strength-bar {
      height: 3px; border-radius: 2px;
      background: var(--border); margin-top: 6px; overflow: hidden;
    }
    .pw-strength-fill { height: 100%; border-radius: 2px; width: 0; transition: all .3s; }
    .pw-strength-label { font-size: .7rem; color: var(--text-muted); margin-top: 4px; }

    /* ---- Error / success msg ---- */
    .field-error { font-size: .78rem; color: #ef5350; margin-top: 4px; display: none; }
    .field-error.show { display: block; }
    .field-ok    { font-size: .78rem; color: #66bb6a; margin-top: 4px; display: none; }
    .field-ok.show { display: block; }

    /* ---- Footer ---- */
    .login-footer { text-align: center; margin-top: 20px; font-size: .7rem; color: var(--text-muted); }

    /* ---- Input icon wrapper ---- */
    .input-wrap { position: relative; }
    .input-wrap .form-input { padding-right: 40px; }
    .pw-toggle {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      padding: 4px; display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--amber); }

    @media (max-width: 480px) { .login-box { padding: 24px 20px; } }
  </style>
</head>
<body>

<canvas id="star-canvas"></canvas>
<div class="ambient-lights">
  <div class="ambient-light light-amber"></div>
  <div class="ambient-light light-cyan"></div>
</div>
<div class="mist"></div>

<div class="login-page">
  <div class="login-card fade-in">
    <div class="login-box">

      <!-- ヘッダー -->
      <div class="login-header">
        <img src="images/logo.svg" alt="ロゴ" class="login-logo">
        <h1 class="login-title">釧チャ</h1>
        <p class="login-subtitle">釧路コミュニティチャット</p>
      </div>

      <!-- タブ -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">ログイン</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">新規登録</button>
      </div>

      <!-- ===== ログインパネル ===== -->
      <div class="auth-panel active" id="panel-login">
        <div class="form-group">
          <label class="form-label" for="login-email">Gmailアドレス</label>
          <input type="email" id="login-email" class="form-input"
            placeholder="example@gmail.com" autocomplete="email">
          <div class="field-error" id="login-email-err"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">パスワード</label>
          <div class="input-wrap">
            <input type="password" id="login-password" class="form-input"
              placeholder="パスワードを入力" autocomplete="current-password">
            <button type="button" class="pw-toggle" onclick="togglePw('login-password', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="login-pw-err"></div>
        </div>

        <button id="login-btn" class="btn btn-primary w-full" style="justify-content:center;margin-top:4px;" onclick="doLogin()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
          ログイン
        </button>

        <!-- 未認証時の再送エリア -->
        <div id="resend-area" class="hidden" style="margin-top:6px;padding:12px 14px;background:var(--bg-elevated);border:1px solid var(--border-amber);border-radius:var(--radius-md);">
          <input type="hidden" id="resend-email-val">
          <p style="font-size:.78rem;color:var(--text-secondary);margin:0 0 8px;">認証メールが届いていない場合は再送できます。</p>
          <button id="resend-login-btn" class="btn btn-ghost btn-sm w-full" style="justify-content:center;" onclick="resendFromLogin()">
            認証メールを再送する
          </button>
        </div>
      </div>

      <!-- ===== 新規登録パネル ===== -->
      <div class="auth-panel" id="panel-register">

        <!-- アバタープレビュー -->
        <div class="avatar-preview" id="reg-preview-card">
          <div id="reg-avatar-preview">?</div>
          <div>
            <div class="preview-nickname" id="reg-preview-name">ニックネームを入力</div>
            <div class="preview-email"   id="reg-preview-email">メールアドレスを入力</div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-nickname">ニックネーム <span style="color:#ef5350">*</span></label>
          <input type="text" id="reg-nickname" class="form-input"
            placeholder="例：釧路太郎、霧の街の住人" maxlength="20" autocomplete="off" spellcheck="false">
          <div class="field-error" id="reg-nickname-err"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-userid">ユーザーID <span style="color:#ef5350">*</span></label>
          <input type="text" id="reg-userid" class="form-input"
            placeholder="例：kushiro_taro（半角英数字・アンダーバーのみ）" maxlength="30" autocomplete="off" spellcheck="false"
            oninput="this.value=this.value.replace(/[^a-zA-Z0-9_]/g,''); checkUserIdAvail(this.value)">
          <p class="text-xs text-muted" style="margin-top:3px;">3〜30文字、半角英数字とアンダーバー（_）のみ使用可</p>
          <div class="field-error" id="reg-userid-err"></div>
          <div class="field-ok"    id="reg-userid-ok" style="display:none;">✓ このIDは使用できます</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-email">Gmailアドレス <span style="color:#ef5350">*</span></label>
          <input type="email" id="reg-email" class="form-input"
            placeholder="example@gmail.com" autocomplete="email">
          <div class="field-error" id="reg-email-err"></div>
          <div class="field-ok"    id="reg-email-ok">✓ 有効なGmailアドレスです</div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password">パスワード <span style="color:#ef5350">*</span></label>
          <div class="input-wrap">
            <input type="password" id="reg-password" class="form-input"
              placeholder="8文字以上で設定" autocomplete="new-password" oninput="checkPwStrength(this.value)">
            <button type="button" class="pw-toggle" onclick="togglePw('reg-password', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="pw-strength-bar"><div class="pw-strength-fill" id="pw-fill"></div></div>
          <div class="pw-strength-label" id="pw-label"></div>
          <div class="field-error" id="reg-pw-err"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="reg-password2">パスワード（確認） <span style="color:#ef5350">*</span></label>
          <div class="input-wrap">
            <input type="password" id="reg-password2" class="form-input"
              placeholder="同じパスワードをもう一度" autocomplete="new-password">
            <button type="button" class="pw-toggle" onclick="togglePw('reg-password2', this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <div class="field-error" id="reg-pw2-err"></div>
          <div class="field-ok"    id="reg-pw2-ok">✓ パスワードが一致しています</div>
        </div>

        <div class="form-group">
          <label class="form-label">アバターカラー</label>
          <div class="color-picker" id="reg-color-picker"></div>
        </div>

        <button id="register-btn" class="btn btn-primary w-full" style="justify-content:center;margin-top:4px;" onclick="doRegister()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg>
          アカウントを作成して参加
        </button>
      </div>

      <div class="login-footer">
        釧路市地域住民向けコミュニティ &nbsp;|&nbsp; 参加無料
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script>
  // ---- タブ切替 ----
  function switchTab(tab) {
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    document.getElementById('tab-login').classList.toggle('active', tab === 'login');
    document.getElementById('tab-register').classList.toggle('active', tab === 'register');
  }

  // ---- パスワード表示切替 ----
  function togglePw(id, btn) {
    const inp = document.getElementById(id);
    const show = inp.type === 'password';
    inp.type = show ? 'text' : 'password';
    btn.style.color = show ? 'var(--amber)' : '';
  }

  // ---- パスワード強度 ----
  function checkPwStrength(pw) {
    const fill  = document.getElementById('pw-fill');
    const label = document.getElementById('pw-label');
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw)) score++;
    if (/[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const map = [
      { w: '20%',  color: '#ef5350', text: '弱い' },
      { w: '40%',  color: '#ff7043', text: '普通' },
      { w: '60%',  color: '#ffa726', text: 'まあまあ' },
      { w: '80%',  color: '#66bb6a', text: '強い' },
      { w: '100%', color: '#4dd0e1', text: '非常に強い' },
    ];
    const s = map[Math.max(0, score - 1)] || map[0];
    fill.style.width = pw ? s.w : '0';
    fill.style.background = s.color;
    label.textContent = pw ? `強度: ${s.text}` : '';
    // 確認欄チェック
    checkPwMatch();
  }

  function checkPwMatch() {
    const pw  = document.getElementById('reg-password').value;
    const pw2 = document.getElementById('reg-password2').value;
    if (!pw2) return;
    const match = pw === pw2;
    showField('reg-pw2-err', match ? '' : 'パスワードが一致しません');
    document.getElementById('reg-pw2-ok').classList.toggle('show', match && !!pw2);
  }

  document.getElementById('reg-password2').addEventListener('input', checkPwMatch);

  // ---- Gmailバリデーション ----
  function isGmail(email) {
    return /^[a-zA-Z0-9._%+\-]+@gmail\.com$/.test(email.trim());
  }
  document.getElementById('reg-email').addEventListener('input', function () {
    const ok  = isGmail(this.value);
    showField('reg-email-err', ok || !this.value ? '' : '@gmail.com のアドレスを入力してください');
    document.getElementById('reg-email-ok').classList.toggle('show', ok);
  });

  // ---- アバタープレビュー更新 ----
  let selectedColor = '#f4a620';
  document.getElementById('reg-nickname').addEventListener('input', updatePreview);

  function checkUserIdAvail(val) {
    const errEl = document.getElementById('reg-userid-err');
    const okEl  = document.getElementById('reg-userid-ok');
    okEl.style.display = 'none';
    if (!val || val.length < 3) { showField('reg-userid-err', ''); return; }
    if (!/^[a-zA-Z0-9_]+$/.test(val)) { showField('reg-userid-err', '半角英数字とアンダーバーのみ使用できます'); return; }
    if (Storage.Accounts.getAll().some(a => a.userId === val)) {
      showField('reg-userid-err', 'このIDはすでに使用されています');
    } else {
      showField('reg-userid-err', '');
      okEl.style.display = 'block';
    }
  }
  document.getElementById('reg-email').addEventListener('input', updatePreview);
  function updatePreview() {
    const name  = document.getElementById('reg-nickname').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const av    = document.getElementById('reg-avatar-preview');
    av.textContent = name ? name.charAt(0).toUpperCase() : '?';
    av.style.background   = selectedColor + '22';
    av.style.borderColor  = selectedColor;
    av.style.color        = selectedColor;
    document.getElementById('reg-preview-name').textContent  = name  || 'ニックネームを入力';
    document.getElementById('reg-preview-email').textContent = email || 'メールアドレスを入力';
    document.getElementById('reg-preview-card').classList.toggle('filled', !!(name || email));
  }

  // ---- カラーピッカー ----
  const COLORS = ['#f4a620','#4dd0e1','#ef5350','#66bb6a','#ab47bc','#42a5f5','#ff7043','#26c6da'];
  const cpEl = document.getElementById('reg-color-picker');
  COLORS.forEach(c => {
    const sw = document.createElement('button');
    sw.type = 'button';
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      selectedColor = c;
      updatePreview();
    });
    cpEl.appendChild(sw);
  });

  // ---- エラー表示ヘルパー ----
  function showField(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.classList.toggle('show', !!msg);
  }

  function showToast(msg, type = '') {
    const ct = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    ct.appendChild(t);
    setTimeout(() => t.remove(), 3500);
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    if (loading) btn.innerHTML = '<span class="spinner"></span>';
  }

  // ---- ログイン ----
  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pw    = document.getElementById('login-password').value;
    showField('login-email-err', '');
    showField('login-pw-err', '');
    if (!email) { showField('login-email-err', 'Gmailアドレスを入力してください'); return; }
    if (!isGmail(email)) { showField('login-email-err', '@gmail.com のアドレスを入力してください'); return; }
    if (!pw) { showField('login-pw-err', 'パスワードを入力してください'); return; }
    setLoading('login-btn', true);
    try {
      const account = await Storage.Accounts.login(email, pw);
      // メール未認証チェック
      if (!account.verified) {
        showField('login-email-err', 'メールアドレスが未確認です。届いた認証メールのリンクをクリックしてください。');
        document.getElementById('resend-area').classList.remove('hidden');
        document.getElementById('resend-email-val').value = email;
        setLoading('login-btn', false);
        document.getElementById('login-btn').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> ログイン';
        return;
      }
      Storage.Users.upsert(account);
      Storage.Session.set({ ...account, name: account.nickname });
      window.location.href = 'chat.html';
    } catch (e) {
      const isEmail = e.message.includes('Gmail') || e.message.includes('登録');
      showField(isEmail ? 'login-email-err' : 'login-pw-err', e.message);
      setLoading('login-btn', false);
      document.getElementById('login-btn').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg> ログイン';
    }
  }

  // ---- 認証メール再送（ログインパネルから） ----
  async function resendFromLogin() {
    const email = document.getElementById('resend-email-val').value;
    const btn = document.getElementById('resend-login-btn');
    btn.disabled = true; btn.textContent = '送信中...';
    try {
      const res  = await fetch(`${API_BASE}/api/resend-verification`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      if (data.ok) { showToast('認証メールを再送しました', 'success'); btn.textContent = '✓ 再送済み'; }
      else { showToast(data.error, 'error'); btn.disabled = false; btn.textContent = '再送する'; }
    } catch { showToast('サーバーに接続できません', 'error'); btn.disabled = false; btn.textContent = '再送する'; }
  }

  // ---- 新規登録 ----
  async function doRegister() {
    const nickname = document.getElementById('reg-nickname').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const pw       = document.getElementById('reg-password').value;
    const pw2      = document.getElementById('reg-password2').value;
    let valid = true;
    showField('reg-nickname-err', '');
    showField('reg-email-err', '');
    showField('reg-pw-err', '');
    showField('reg-pw2-err', '');

    const userId = document.getElementById('reg-userid').value.trim();
    showField('reg-userid-err', '');
    if (!nickname) { showField('reg-nickname-err', 'ニックネームを入力してください'); valid = false; }
    if (!userId || userId.length < 3) { showField('reg-userid-err', 'ユーザーIDは3文字以上入力してください'); valid = false; }
    else if (!/^[a-zA-Z0-9_]+$/.test(userId)) { showField('reg-userid-err', '半角英数字とアンダーバーのみ使用できます'); valid = false; }
    else if (Storage.Accounts.getAll().some(a => a.userId === userId)) { showField('reg-userid-err', 'このIDはすでに使用されています'); valid = false; }
    if (!isGmail(email)) { showField('reg-email-err', '@gmail.com のアドレスを入力してください'); valid = false; }
    if (pw.length < 8) { showField('reg-pw-err', 'パスワードは8文字以上にしてください'); valid = false; }
    if (pw !== pw2) { showField('reg-pw2-err', 'パスワードが一致しません'); valid = false; }
    if (!valid) return;

    setLoading('register-btn', true);
    try {
      // 既存アカウント重複確認
      if (Storage.Accounts.findByEmail(email)) {
        showField('reg-email-err', 'このGmailアドレスはすでに登録されています');
        setLoading('register-btn', false);
        document.getElementById('register-btn').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> アカウントを作成して参加';
        return;
      }

      // パスワードをハッシュ化
      const passwordHash = await Storage.sha256(pw);

      // サーバーに認証メール送信を依頼
      const res = await fetch(`${API_BASE}/api/send-verification`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-Secret': window.KUSHIRO_API_SECRET || '',
        },
        body: JSON.stringify({ email, nickname, userId, passwordHash, color: selectedColor }),
      });

      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'サーバーエラーが発生しました');

      // 送信成功 → 確認待ち画面へ切替
      showVerifyWaiting(email);

    } catch (e) {
      const msg = e.message.includes('fetch') ? 'サーバーに接続できません。サーバーが起動しているか確認してください。' : e.message;
      showField('reg-email-err', msg);
      setLoading('register-btn', false);
      document.getElementById('register-btn').innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> アカウントを作成して参加';
    }
  }

  // ---- メール確認待ち画面 ----
  function showVerifyWaiting(email) {
    document.getElementById('panel-register').innerHTML = `
      <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:14px;padding:8px 0;">
        <div style="font-size:3rem;">📧</div>
        <p style="font-family:var(--font-serif);font-size:1.1rem;color:var(--amber);">認証メールを送信しました</p>
        <div style="background:var(--bg-elevated);border:1px solid var(--border-amber);border-radius:var(--radius-md);padding:12px 16px;width:100%;">
          <p style="font-size:.75rem;color:var(--text-muted);margin:0 0 4px;">送信先</p>
          <p style="font-size:.9rem;color:var(--cyan);margin:0;word-break:break-all;">${email}</p>
        </div>
        <p style="font-size:.85rem;color:var(--text-secondary);line-height:1.7;margin:0;">
          受信したメール内の<strong style="color:var(--amber);">「メールアドレスを確認する」</strong>ボタンをクリックして、登録を完了してください。
        </p>
        <p style="font-size:.75rem;color:var(--text-muted);">メールが届かない場合は迷惑メールフォルダをご確認ください</p>
        <button class="btn btn-ghost btn-sm w-full" style="justify-content:center;" id="resend-waiting-btn">
          認証メールを再送する
        </button>
      </div>
    `;
    document.getElementById('resend-waiting-btn')?.addEventListener('click', async () => {
      const btn = document.getElementById('resend-waiting-btn');
      btn.disabled = true; btn.textContent = '送信中...';
      try {
        const res = await fetch(`${API_BASE}/api/resend-verification`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const d = await res.json();
        if (d.ok) { showToast('認証メールを再送しました', 'success'); btn.textContent = '✓ 再送済み'; }
        else { showToast(d.error, 'error'); btn.disabled = false; btn.textContent = '認証メールを再送する'; }
      } catch { showToast('サーバーに接続できません', 'error'); btn.disabled = false; btn.textContent = '認証メールを再送する'; }
    });
  }

  // ---- Enter キー ----
  ['login-email','login-password'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); })
  );
  ['reg-nickname','reg-email','reg-password','reg-password2'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doRegister(); })
  );

  // ---- 星空アニメーション ----
  (function initCanvas() {
    const canvas = document.getElementById('star-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const stars = Array.from({length:150}, () => ({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height*.6,
      r: Math.random()*1.5+.3, alpha: Math.random()*.7+.3,
      speed: Math.random()*.003+.001, phase: Math.random()*Math.PI*2,
    }));
    const lights = Array.from({length:12}, () => ({
      x: Math.random()*canvas.width, y: canvas.height*(.6+Math.random()*.1),
      r: Math.random()*3+1, color: Math.random()>.5 ? '#f4a620' : '#ffd54f',
      pulse: Math.random()*.02+.005, phase: Math.random()*Math.PI*2,
    }));
    let t = 0;
    function draw() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      t += .01;
      stars.forEach(s => {
        const a = s.alpha*(0.7+0.3*Math.sin(t*s.speed*10+s.phase));
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(232,234,246,${a})`; ctx.fill();
      });
      lights.forEach(l => {
        const glow = 1+.3*Math.sin(t*l.pulse*10+l.phase);
        const g = ctx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*10*glow);
        g.addColorStop(0,l.color+'cc'); g.addColorStop(1,l.color+'00');
        ctx.beginPath(); ctx.arc(l.x,l.y,l.r*10*glow,0,Math.PI*2);
        ctx.fillStyle = g; ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
  })();

  // API設定
  const API_BASE = window.KUSHIRO_API_BASE || 'https://kushiro-chat-auth.preview-me.workers.dev';

  // セッション確認
  const _sess = Storage.Session.get();
  if (_sess && _sess.verified) window.location.href = 'chat.html';
</script>
</body>
</html>
